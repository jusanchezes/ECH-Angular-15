<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE_NURSE_NOTES">ECH Nurse Notes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="css/clinical-core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/action-bar.css">
    <link rel="stylesheet" href="css/modules/nurse-notes.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- BEGIN: Angular Standalone Component — SidebarComponent -->
    <aside class="sidebar collapsed" id="sidebar-component"></aside>
    <!-- END: SidebarComponent -->

    <main class="main-content">
        <!-- BEGIN: Angular Standalone Component — HeaderComponent -->
        <header class="top-bar" id="header-component"></header>
        <!-- END: HeaderComponent -->
        <!-- BEGIN: Angular Standalone Component — ClinicalBannerComponent -->
        <section class="clinical-banner" id="banner-component"></section>
        <!-- END: ClinicalBannerComponent -->

        <!-- ACTION BAR: Nurse quick-actions. Angular: NurseNotesActionBarComponent -->
        <!-- BEGIN: Angular Standalone Component — ActionBarComponent -->
        <section class="action-bar" id="action-bar-component">
            <button class="action-btn action-btn-primary" onclick="handleQuickAction('Administer Medication')" data-i18n-title="ACTIONS.ADMIN_MED" title="Administer Medication">
                <i class="pi pi-box"></i> <span data-i18n="ACTIONS.ADMIN_MED">Administer Medication</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Administer Care')" data-i18n-title="ACTIONS.ADMIN_CARE" title="Administer Care">
                <i class="pi pi-heart"></i> <span data-i18n="ACTIONS.ADMIN_CARE">Administer Care</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Record Vital Signs')" data-i18n-title="ACTIONS.RECORD_VITALS" title="Record Vital Signs">
                <i class="pi pi-chart-line"></i> <span data-i18n="ACTIONS.RECORD_VITALS">Record Vitals</span>
            </button>
            <div class="action-bar-separator"></div>
            <button class="action-btn" onclick="handleQuickAction('Record I/O')" data-i18n-title="ACTIONS.RECORD_IO" title="Record Intake/Output">
                <i class="pi pi-sync"></i> <span data-i18n="ACTIONS.RECORD_IO">Record I/O</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Record Assessment')" data-i18n-title="ACTIONS.RECORD_ASSESSMENT" title="Record Assessment">
                <i class="pi pi-check-square"></i> <span data-i18n="ACTIONS.RECORD_ASSESSMENT">Assessment</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Add Nursing Note')" data-i18n-title="ACTIONS.ADD_NURSE_NOTE" title="Add Nursing Note">
                <i class="pi pi-pencil"></i> <span data-i18n="ACTIONS.ADD_NURSE_NOTE">Nursing Note</span>
            </button>
        </section>
        <!-- END: ActionBarComponent -->

        <!-- BEGIN: Angular Standalone Component — FilterBarComponent -->
        <section class="filter-bar flex align-items-center gap-2 flex-wrap" id="filter-bar">
        </section>
        <!-- END: FilterBarComponent -->

        <!-- COMPONENT BOUNDARY: <ech-nurse-notes> — Nursing Overview Shift-Based View -->
        <!-- Layout: PrimeFlex 2-column grid for high-density 14" screen optimization -->
        <section class="module-content-area nn-content" id="module-content">

            <!-- Section Title: Nursing Overview -->
            <!-- <div class="nn-section-title" data-i18n="NN.TITLE">Nursing Overview — Shift-Based View</div>

            <!-- SAFETY STRIP: Quick-glance safety indicators. Angular: NurseSafetyStripComponent -->


            <div class="grid nn-grid">

                <!-- ==================== LEFT COLUMN ==================== -->
                <div class="col-12 md:col-6">

                    <!-- PANEL 1: Handoff Report -->
                    <!-- Angular: HandoffReportComponent — data-field maps to HandoffReportDTO -->
                    <div class="pv-panel nn-panel">
                        <div class="pv-panel-header" data-i18n="NN.HANDOFF_REPORT">Handoff Report</div>
                        <div class="pv-panel-body">
                            <!-- data-field="handoffItems" — Java DTO: List<HandoffItemDTO> -->
                            <div class="nn-checklist-item" data-field="handoff_sbar">
                                <span class="nn-checklist-bullet nn-checklist-bullet-done"></span>
                                <span data-i18n="NN.SBAR_SUMMARY">SBAR Summary</span>
                            </div>
                            <div class="nn-checklist-item" data-field="handoff_events">
                                <span class="nn-checklist-bullet nn-checklist-bullet-pending"></span>
                                <span data-i18n="NN.SHIFT_EVENTS">Shift Events</span>
                            </div>
                        </div>
                    </div>

                    <!-- PANEL 2: Shift Checklist -->
                    <!-- Angular: ShiftChecklistComponent — data-field maps to ShiftChecklistDTO -->
                    <div class="pv-panel nn-panel">
                        <div class="pv-panel-header" data-i18n="NN.SHIFT_CHECKLIST">Shift Checklist</div>
                        <div class="pv-panel-body">
                            <!-- data-field="shiftChecklist" — Java DTO: List<ChecklistItemDTO> -->
                            <div class="nn-checklist-item" data-field="check_ivLines">
                                <span class="nn-checklist-bullet nn-checklist-bullet-done"></span>
                                <span data-i18n="NN.IV_LINES">IV Lines</span>
                            </div>
                            <div class="nn-checklist-item" data-field="check_catheters">
                                <span class="nn-checklist-bullet nn-checklist-bullet-pending"></span>
                                <span data-i18n="NN.CATHETERS">Catheters</span>
                            </div>
                            <div class="nn-checklist-item" data-field="check_woundCare">
                                <span class="nn-checklist-bullet nn-checklist-bullet-pending"></span>
                                <span data-i18n="NN.WOUND_CARE">Wound Care Tasks</span>
                            </div>
                            <div class="nn-checklist-item" data-field="check_turnReposition">
                                <span class="nn-checklist-bullet nn-checklist-bullet-done"></span>
                                <span data-i18n="NN.TURN_REPOSITION">Turn &amp; Reposition</span>
                            </div>
                        </div>
                    </div>

                    <!-- PANEL 3: Medications Due -->
                    <!-- Angular: MedicationsDueComponent — data-field maps to MedicationDueDTO -->
                    <div class="pv-panel nn-panel">
                        <div class="pv-panel-header" data-i18n="NN.MEDICATIONS_DUE">Medications Due</div>
                        <div class="pv-panel-body">
                            <!-- data-field="medicationsDue" — Java DTO: List<MedicationDueDTO> -->
                            <div class="nn-med-due-item" data-field="medDue_1">
                                <span class="nn-med-time" data-field="medDueTime">8:00 AM</span>
                                <span class="nn-med-name" data-field="medDueName">Med A</span>
                                <span class="pv-badge pv-badge-high-risk" data-i18n="PS.HIGH_RISK">HIGH-RISK</span>
                            </div>
                            <div class="nn-med-due-item" data-field="medDue_2">
                                <span class="nn-med-time" data-field="medDueTime">9:00 AM</span>
                                <span class="nn-med-name" data-field="medDueName">Med B</span>
                            </div>
                            <div class="nn-med-due-item" data-field="medDue_3">
                                <span class="nn-med-time" data-field="medDueTime">10:00 AM</span>
                                <span class="nn-med-name" data-field="medDueName">Med C</span>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- ==================== RIGHT COLUMN ==================== -->
                <div class="col-12 md:col-6">

                    <!-- PANEL 4: Quick Assessments -->
                    <!-- Angular: QuickAssessmentsComponent — data-field maps to QuickAssessmentDTO -->
                    <div class="pv-panel nn-panel">
                        <div class="pv-panel-header" data-i18n="NN.QUICK_ASSESSMENTS">Quick Assessments</div>
                        <div class="pv-panel-body">
                            <!-- data-field="quickAssessments" — Java DTO: QuickAssessmentDTO -->
                            <div class="nn-assessment-grid">
                                <div class="nn-score-item" data-field="scoreGCS">
                                    <span class="nn-score-label" data-i18n="NN.GCS">GCS:</span>
                                    <span class="nn-score-value" data-field="gcsValue">0</span>
                                </div>
                                <div class="nn-score-item" data-field="scoreRASS">
                                    <span class="nn-score-label" data-i18n="NN.RASS">RASS:</span>
                                    <span class="nn-score-value" data-field="rassValue">0</span>
                                </div>
                                <div class="nn-score-item" data-field="scorePain">
                                    <span class="nn-score-label" data-i18n="NN.PAIN_SCORE">Pain Score:</span>
                                    <span class="nn-score-value" data-field="painValue">0</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- PANEL 5: Flowsheet Links -->
                    <!-- Angular: FlowsheetLinksComponent — quick navigation to related flowsheets -->
                    <div class="pv-panel nn-panel">
                        <div class="pv-panel-header" data-i18n="NN.FLOWSHEET_LINKS">Flowsheet Links</div>
                        <div class="pv-panel-body">
                            <div class="nn-flowsheet-links">
                                <a href="measurements.html" class="nn-flowsheet-link" data-i18n="NN.VITALS">
                                    <i class="pi pi-chart-line" style="font-size:0.85rem"></i> Vitals
                                </a>
                                <a href="#" class="nn-flowsheet-link" onclick="handleQuickAction('Open I&O Flowsheet'); return false;" data-i18n="NN.IO">
                                    <i class="pi pi-sync" style="font-size:0.85rem"></i> I&amp;O
                                </a>
                                <a href="#" class="nn-flowsheet-link" onclick="handleQuickAction('Open Wounds Flowsheet'); return false;" data-i18n="NN.WOUNDS">
                                    <i class="pi pi-heart" style="font-size:0.85rem"></i> Wounds
                                </a>
                                <a href="#" class="nn-flowsheet-link" onclick="handleQuickAction('Open Devices Flowsheet'); return false;" data-i18n="NN.DEVICES">
                                    <i class="pi pi-cog" style="font-size:0.85rem"></i> Devices
                                </a>
                            </div>
                        </div>
                    </div>

                </div>

            </div>
        </section>
    </main>
</div>

<script src="mock-clinical-data.js"></script>
<script src="clinical-data.service.js"></script>
<script src="layout.js"></script>
<script>
(function() {
    function renderNurseNotes() {
        var data = ClinicalDataService.getNurseNotes();
        if (!data) return;

        var handoffContainer = document.querySelector('[data-field="handoff_sbar"]');
        if (handoffContainer && data.handoffItems) {
            var parent = handoffContainer.parentElement;
            parent.innerHTML = '';
            data.handoffItems.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'nn-checklist-item';
                div.setAttribute('data-field', 'handoff_' + item.id);
                div.innerHTML = '<span class="nn-checklist-bullet nn-checklist-bullet-' + item.status + '"></span>' +
                    '<span>' + item.label + '</span>';
                parent.appendChild(div);
            });
        }

        var checklistFirst = document.querySelector('[data-field="check_ivLines"]');
        if (checklistFirst && data.shiftChecklist) {
            var clParent = checklistFirst.parentElement;
            clParent.innerHTML = '';
            data.shiftChecklist.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'nn-checklist-item';
                div.setAttribute('data-field', 'check_' + item.id);
                div.innerHTML = '<span class="nn-checklist-bullet nn-checklist-bullet-' + item.status + '"></span>' +
                    '<span>' + item.label + '</span>';
                clParent.appendChild(div);
            });
        }

        var medFirst = document.querySelector('[data-field="medDue_1"]');
        if (medFirst && data.medicationsDue) {
            var medParent = medFirst.parentElement;
            medParent.innerHTML = '';
            data.medicationsDue.forEach(function(med) {
                var div = document.createElement('div');
                div.className = 'nn-med-due-item';
                div.setAttribute('data-field', 'medDue_' + med.id);
                var badgeHtml = med.highRisk ? ' <span class="pv-badge pv-badge-high-risk">HIGH-RISK</span>' : '';
                div.innerHTML = '<span class="nn-med-time">' + med.time + '</span>' +
                    '<span class="nn-med-name">' + med.name + '</span>' + badgeHtml;
                medParent.appendChild(div);
            });
        }

        if (data.quickAssessments) {
            var gcsEl = document.querySelector('[data-field="gcsValue"]');
            var rassEl = document.querySelector('[data-field="rassValue"]');
            var painEl = document.querySelector('[data-field="painValue"]');
            if (gcsEl) gcsEl.textContent = data.quickAssessments.gcs;
            if (rassEl) rassEl.textContent = data.quickAssessments.rass;
            if (painEl) painEl.textContent = data.quickAssessments.painScore;
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderNurseNotes);
    } else {
        renderNurseNotes();
    }
})();
</script>

</body>
</html>
