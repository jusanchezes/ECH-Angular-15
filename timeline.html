<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE">ECH Patient Timeline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="css/clinical-core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/action-bar.css">
    <link rel="stylesheet" href="css/modules/timeline.css">
    <link rel="stylesheet" href="css/modules/doc-preview.css">
    <link rel="stylesheet" href="css/modules/note-editor.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- LAYOUT: PrimeFlex grid shell. Angular equivalent: app.component.html with <router-outlet> -->
<div class="layout">

    <!-- OVERLAY: Mobile sidebar backdrop. Angular: controlled via SidebarService.isOpen$ observable -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- COMPONENT BOUNDARY: <ech-sidebar> — Injected by layout.js -->
    <!-- BEGIN: Angular Standalone Component — SidebarComponent -->
    <aside class="sidebar collapsed" id="sidebar-component"></aside>
    <!-- END: SidebarComponent -->

    <main class="main-content">

        <!-- COMPONENT BOUNDARY: <ech-header> — Injected by layout.js -->
        <!-- BEGIN: Angular Standalone Component — HeaderComponent -->
        <header class="top-bar" id="header-component"></header>
        <!-- END: HeaderComponent -->

        <!-- COMPONENT BOUNDARY: <ech-clinical-banner> — Injected by layout.js -->
        <!-- BEGIN: Angular Standalone Component — ClinicalBannerComponent -->
        <section class="clinical-banner" id="banner-component"></section>
        <!-- END: ClinicalBannerComponent -->

        <!actions bar; unique per module page -->
        <!-- BEGIN: Angular Standalone Component — ActionBarComponent -->
        <section class="action-bar" id="action-bar-component">
            <button class="action-btn action-btn-primary" onclick="openNoteEditor()" data-i18n-title="ACTIONS.ADD_NOTE" title="Physical examination">
                <i class="pi pi-plus"></i> <span data-i18n="ACTIONS.ADD_NOTE">Phisical examination</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Prescribe Medication')" data-i18n-title="ACTIONS.PRESCRIBE" title="Prescribe Medication">
                <i class="pi pi-box"></i> <span data-i18n="ACTIONS.PRESCRIBE">Medication order</span>
            </button>
            <!-- DROPDOWN: Doctors Forms -->
            <div class="action-dropdown" id="dd-doctors-forms">
                <button class="action-dropdown-trigger" onclick="toggleActionDropdown('dd-doctors-forms')" title="Doctors Forms">
                    <i class="pi pi-chart-line"></i>
                    <span>Doctors Forms</span>
                    <i class="pi pi-chevron-down action-dropdown-chevron"></i>
                </button>
                <div class="action-dropdown-panel">
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-doctors-forms','Admission Note')"><i class="pi pi-file"></i> Admission Note</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-doctors-forms','Discharge Summary')"><i class="pi pi-file-export"></i> Discharge Summary</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-doctors-forms','Progress Note')"><i class="pi pi-pencil"></i> Progress Note</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-doctors-forms','Consultation Request')"><i class="pi pi-send"></i> Consultation Request</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-doctors-forms','Inter-consultation')"><i class="pi pi-arrow-right-arrow-left"></i> Inter-consultation</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-doctors-forms','Surgical Note')"><i class="pi pi-heart"></i> Surgical Note</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-doctors-forms','Anesthesia Note')"><i class="pi pi-shield"></i> Anesthesia Note</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-doctors-forms','Procedure Note')"><i class="pi pi-list"></i> Procedure Note</button>
                </div>
            </div>

            <!-- DROPDOWN: Diag Exams -->
            <div class="action-dropdown" id="dd-diag-exams">
                <button class="action-dropdown-trigger" onclick="toggleActionDropdown('dd-diag-exams')" title="Diagnostic Exams">
                    <i class="pi pi-search"></i>
                    <span>Diag Exams</span>
                    <i class="pi pi-chevron-down action-dropdown-chevron"></i>
                </button>
                <div class="action-dropdown-panel">
                    <div class="action-dropdown-section-label">Radiology</div>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-diag-exams','X-Ray')"><i class="pi pi-image"></i> X-Ray</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-diag-exams','CT Scan')"><i class="pi pi-image"></i> CT Scan</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-diag-exams','MRI')"><i class="pi pi-image"></i> MRI</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-diag-exams','Ultrasound')"><i class="pi pi-image"></i> Ultrasound</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-diag-exams','Nuclear Medicine')"><i class="pi pi-image"></i> Nuclear Medicine</button>
                    <div class="action-dropdown-divider"></div>
                    <div class="action-dropdown-section-label">Laboratory</div>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-diag-exams','Blood Panel')"><i class="pi pi-chart-bar"></i> Blood Panel</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-diag-exams','Urinalysis')"><i class="pi pi-chart-bar"></i> Urinalysis</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-diag-exams','Microbiology')"><i class="pi pi-chart-bar"></i> Microbiology</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-diag-exams','Blood Bank')"><i class="pi pi-chart-bar"></i> Blood Bank</button>
                    <div class="action-dropdown-divider"></div>
                    <div class="action-dropdown-section-label">Pathology</div>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-diag-exams','Biopsy')"><i class="pi pi-microscope"></i> Biopsy</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-diag-exams','Cytology')"><i class="pi pi-microscope"></i> Cytology</button>
                </div>
            </div>

            <div class="action-bar-separator"></div>
            <button class="action-btn" onclick="handleQuickAction('Add Diagnosis')" data-i18n-title="ACTIONS.ADD_DIAGNOSIS" title="Add Diagnosis">
                <i class="pi pi-tag"></i> <span data-i18n="ACTIONS.ADD_DIAGNOSIS">Diagnoses</span>
            </button>

            <!-- DROPDOWN: Reports -->
            <div class="action-dropdown" id="dd-reports">
                <button class="action-dropdown-trigger" onclick="toggleActionDropdown('dd-reports')" title="Reports">
                    <i class="pi pi-file-pdf"></i>
                    <span>Reports</span>
                    <i class="pi pi-chevron-down action-dropdown-chevron"></i>
                </button>
                <div class="action-dropdown-panel">
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-reports','Discharge Report')"><i class="pi pi-file-export"></i> Discharge Report</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-reports','Referral Letter')"><i class="pi pi-envelope"></i> Referral Letter</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-reports','Medical Certificate')"><i class="pi pi-verified"></i> Medical Certificate</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-reports','Epicrisis')"><i class="pi pi-book"></i> Epicrisis</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-reports','Operative Report')"><i class="pi pi-file"></i> Operative Report</button>
                </div>
            </div>

            <!-- DROPDOWN: Risk Assessment -->
            <div class="action-dropdown" id="dd-risk">
                <button class="action-dropdown-trigger" onclick="toggleActionDropdown('dd-risk')" title="Risk Assessment">
                    <i class="pi pi-exclamation-triangle"></i>
                    <span>Risk Assessment</span>
                    <i class="pi pi-chevron-down action-dropdown-chevron"></i>
                </button>
                <div class="action-dropdown-panel">
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-risk','Fall Risk (Morse Scale)')"><i class="pi pi-person"></i> Fall Risk (Morse Scale)</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-risk','Pressure Ulcer Risk (Braden Scale)')"><i class="pi pi-sun"></i> Pressure Ulcer Risk (Braden Scale)</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-risk','DVT/Thrombosis Risk (Caprini)')"><i class="pi pi-heart"></i> DVT/Thrombosis Risk (Caprini)</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-risk','Nutritional Risk (NRS-2002)')"><i class="pi pi-table"></i> Nutritional Risk (NRS-2002)</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-risk','Pain Assessment (NRS)')"><i class="pi pi-info-circle"></i> Pain Assessment (NRS)</button>
                    <button class="action-dropdown-item" onclick="selectActionDropdown('dd-risk','Delirium Risk')"><i class="pi pi-exclamation-circle"></i> Delirium Risk</button>
                </div>
            </div>

            <button class="action-btn" onclick="handleQuickAction('Logistic Request')" data-i18n-title="ACTIONS.LOG_REQ" title="Logistic Request">
                <i class="pi pi-file-pdf"></i> <span data-i18n="ACTIONS.LOG_REQ">Log Request</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Medical History')" data-i18n-title="ACTIONS.MED_HIS" title="Medical History">
                <i class="pi pi-file-pdf"></i> <span data-i18n="ACTIONS.MED_HIS">Medical History</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Print')" data-i18n-title="ACTIONS.PRINT" title="Print">
                <i class="pi pi-file-pdf"></i> <span data-i18n="ACTIONS.PRINT">Print</span>
            </button>
        </section>
        <!-- END: ActionBarComponent -->

        <!-- FILTER BAR: Timeline-specific filters. Angular: TimelineFilterComponent -->
        <!-- BEGIN: Angular Standalone Component — FilterBarComponent -->
        <section class="filter-bar flex align-items-center gap-2 flex-wrap" id="filter-bar">
            <div class="filter-group flex align-items-center gap-1">
                <label data-i18n="FILTER.TIME"><i class="pi pi-clock"></i> Time:</label>
                <div class="select-button-group" id="time-filter">
                    <button class="sb-option fs-xs" data-value="24h" data-i18n="FILTER.24H">24h</button>
                    <button class="sb-option fs-xs" data-value="48h" data-i18n="FILTER.48H">48h</button>
                    <button class="sb-option fs-xs" data-value="7d" data-i18n="FILTER.7D">7d</button>
                    <button class="sb-option active fs-xs" data-value="full" data-i18n="FILTER.FULL_EPISODE">Full Episode</button>
                </div>
            </div>

            <div class="filter-group flex align-items-center gap-1">
                <label data-i18n="FILTER.ROLE"><i class="pi pi-users"></i> Role:</label>
                <div class="multi-select-wrapper">
                    <div class="multi-select-btn flex align-items-center gap-1 fs-xs" onclick="toggleMultiSelect()">
                        <span id="roleLabel" data-i18n="FILTER.ALL_ROLES">All Roles</span>
                        <i class="pi pi-chevron-down ml-auto text-xs"></i>
                    </div>
                    <div class="multi-select-panel" id="rolePanel">
                        <label class="ms-option"><input type="checkbox" value="All" checked onchange="updateRoleFilter(this)"> <span data-i18n="FILTER.ROLE_ALL">All</span></label>
                        <label class="ms-option"><input type="checkbox" value="Physician" onchange="updateRoleFilter(this)"> <span data-i18n="FILTER.ROLE_PHYSICIAN">Physician</span></label>
                        <label class="ms-option"><input type="checkbox" value="Nursing" onchange="updateRoleFilter(this)"> <span data-i18n="FILTER.ROLE_NURSING">Nursing</span></label>
                        <label class="ms-option"><input type="checkbox" value="Radiology" onchange="updateRoleFilter(this)"> <span data-i18n="FILTER.ROLE_RADIOLOGY">Radiology</span></label>
                        <label class="ms-option"><input type="checkbox" value="Pharmacy" onchange="updateRoleFilter(this)"> <span data-i18n="FILTER.ROLE_PHARMACY">Pharmacy</span></label>
                    </div>
                </div>
            </div>

            <div class="filter-group flex align-items-center gap-1">
                <label><i class="pi pi-tag"></i> Type:</label>
                <div class="multi-select-wrapper">
                    <div class="multi-select-btn flex align-items-center gap-1 fs-xs" onclick="toggleTypeSelect()">
                        <span id="typeLabel">All Types</span>
                        <i class="pi pi-chevron-down ml-auto text-xs"></i>
                    </div>
                    <div class="multi-select-panel" id="typePanel">
                        <label class="ms-option"><input type="checkbox" value="All" checked onchange="updateTypeFilter(this)"> All</label>
                        <label class="ms-option"><input type="checkbox" value="Document" onchange="updateTypeFilter(this)"> Document</label>
                        <label class="ms-option"><input type="checkbox" value="Note" onchange="updateTypeFilter(this)"> Note</label>
                        <label class="ms-option"><input type="checkbox" value="Exam" onchange="updateTypeFilter(this)"> Exam</label>
                        <label class="ms-option"><input type="checkbox" value="Medication" onchange="updateTypeFilter(this)"> Medication</label>
                        <label class="ms-option"><input type="checkbox" value="Images" onchange="updateTypeFilter(this)"> Images</label>
                        <label class="ms-option"><input type="checkbox" value="Care" onchange="updateTypeFilter(this)"> Care</label>
                        <label class="ms-option"><input type="checkbox" value="Surgery" onchange="updateTypeFilter(this)"> Surgery</label>
                        <label class="ms-option"><input type="checkbox" value="Vitals" onchange="updateTypeFilter(this)"> Vitals</label>
                    </div>
                </div>
            </div>

            <div class="filter-group flex-1 flex align-items-center gap-1">
                <label><i class="pi pi-search"></i></label>
                <input type="text" class="search-input w-full fs-xs" id="searchInput" placeholder="Search timeline..." data-i18n-placeholder="FILTER.SEARCH_PLACEHOLDER">
            </div>

            <div class="filter-group column-toggle-wrapper relative">
                <button class="column-toggle-btn flex align-items-center gap-1 fs-xs" onclick="toggleColumnPanel()" data-i18n-title="FILTER.COLUMNS_TITLE" title="Configure visible columns">
                    <i class="pi pi-sliders-h"></i> <span data-i18n="FILTER.COLUMNS">Columns</span>
                </button>
                <div class="column-panel" id="columnPanel">
                    <label class="col-option"><input type="checkbox" value="time" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.TIME">Time</span></label>
                    <label class="col-option"><input type="checkbox" value="type" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.TYPE">Type</span></label>
                    <label class="col-option"><input type="checkbox" value="dept" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.DEPARTMENT">Department</span></label>
                    <label class="col-option"><input type="checkbox" value="description" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.DESCRIPTION">Description</span></label>
                    <label class="col-option"><input type="checkbox" value="card" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.SERVICE_CARD">Service Card</span></label>
                    <label class="col-option"><input type="checkbox" value="actions" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.ACTIONS">Actions</span></label>
                </div>
            </div>
        </section>
        <!-- END: FilterBarComponent -->

        <!-- Timeline docs reading modal (fixed overlay, opened when a Document entry is clicked) -->
        <div class="doc-reading-modal doc-modal-overlay" id="tl-doc-reading-modal" style="display:none">
            <div class="doc-reading-topbar">
                <button class="doc-reading-back-btn" onclick="tlCloseReadingModal()">
                    <i class="pi pi-arrow-left"></i> Back to timeline
                </button>
                <div class="doc-reading-topbar-actions">
                    <button class="doc-action-btn doc-action-download" title="Download PDF" onclick="tlHandleDocAction('download', _tlPreviewCtrl.getCurrentDocId())">
                        <i class="pi pi-file-pdf"></i>
                    </button>
                    <button class="doc-action-btn doc-action-share" title="Print" onclick="tlHandleDocAction('print', _tlPreviewCtrl.getCurrentDocId())">
                        <i class="pi pi-print"></i>
                    </button>
                </div>
            </div>
            <div class="doc-reading-content" id="tl-doc-reading-content"></div>
        </div>

        <!-- API Contract: GET /api/v1/clinical/timeline/{patientId} → TimelineEntryGroupDTO[] — Ver API_contracts.md -->

        <!-- TIMELINE CONTENT: Angular equivalent: <p-timeline> component with custom templates -->
        <section class="timeline-area" id="timeline-area">
            <div class="timeline-container" id="timelineContainer">
            </div>
        </section>

    </main>
</div>

<!-- NOTE EDITOR PANEL: Physical examination / Progress Note
     Fixed bottom panel with rich-text toolbar.
     Angular equivalent: NoteEditorPanelComponent (position: fixed overlay)
     Opened by openNoteEditor() in app.js -->
<div class="note-editor-panel" id="noteEditorPanel" aria-label="Progress Note Editor" role="dialog">

    <!-- Header -->
    <div class="note-editor-header">
        <div class="note-editor-header-left">
            <span class="note-editor-label">Progress Note :</span>
            <span class="note-editor-note-type">Physical Examination</span>
        </div>
        <div class="note-editor-header-right">
            <span class="note-editor-patient" id="noteEditorPatient">
                <i class="pi pi-user"></i>
                <span id="noteEditorPatientName"></span>
            </span>
            <span class="note-editor-header-sep">|</span>
            <span class="note-editor-author" id="noteEditorAuthor">
                <i class="pi pi-pencil"></i>
                <span id="noteEditorAuthorName"></span>
            </span>
            <button class="note-editor-header-close" onclick="closeNoteEditor()" title="Close editor">
                <i class="pi pi-times"></i>
            </button>
        </div>
    </div>

    <!-- Formatting Toolbar -->
    <div class="note-editor-toolbar" id="noteEditorToolbar">
        <!-- Discard -->
        <button class="ne-tb-btn" onclick="closeNoteEditor()" title="Discard note">
            <i class="pi pi-times"></i>
        </button>
        <div class="ne-tb-sep"></div>
        <!-- Undo / Redo -->
        <button class="ne-tb-btn" onclick="noteEditorCmd('undo')" title="Undo">&#8617;</button>
        <button class="ne-tb-btn" onclick="noteEditorCmd('redo')" title="Redo">&#8618;</button>
        <!-- Cut / Copy / Paste -->
        <button class="ne-tb-btn" onclick="noteEditorCmd('cut')" title="Cut">&#9986;</button>
        <button class="ne-tb-btn" onclick="noteEditorCmd('copy')" title="Copy"><i class="pi pi-copy"></i></button>
        <button class="ne-tb-btn" onclick="noteEditorCmd('paste')" title="Paste">&#128203;</button>
        <div class="ne-tb-sep"></div>
        <!-- Headings -->
        <button class="ne-tb-btn ne-tb-h1" onclick="noteEditorFormat('h1')" title="Heading 1">H1</button>
        <button class="ne-tb-btn ne-tb-h2" onclick="noteEditorFormat('h2')" title="Heading 2">H2</button>
        <!-- Inline formatting -->
        <button class="ne-tb-btn ne-tb-btn-bold"   id="neTbBold"   onclick="noteEditorCmd('bold')"        title="Bold">B</button>
        <button class="ne-tb-btn ne-tb-btn-italic"  id="neTbItalic" onclick="noteEditorCmd('italic')"      title="Italic">I</button>
        <button class="ne-tb-btn ne-tb-btn-under"   id="neTbUnder"  onclick="noteEditorCmd('underline')"   title="Underline">U</button>
        <button class="ne-tb-btn ne-tb-btn-strike"  id="neTbStrike" onclick="noteEditorCmd('strikeThrough')" title="Strikethrough">S</button>
        <button class="ne-tb-btn" onclick="noteEditorCmd('removeFormat')" title="Clear formatting">T&#x0332;</button>
        <div class="ne-tb-sep"></div>
        <!-- Format block -->
        <select class="ne-tb-select" onchange="noteEditorFormatBlock(this)" title="Format">
            <option value="">Format</option>
            <option value="p">Paragraph</option>
            <option value="h1">Heading 1</option>
            <option value="h2">Heading 2</option>
            <option value="h3">Heading 3</option>
            <option value="pre">Preformatted</option>
            <option value="blockquote">Blockquote</option>
        </select>
        <div class="ne-tb-sep"></div>
        <!-- Font size -->
        <button class="ne-tb-btn ne-tb-aa-sm" onclick="noteEditorFontSize(1)" title="Small text">Aa</button>
        <button class="ne-tb-btn ne-tb-aa-md" onclick="noteEditorFontSize(3)" title="Normal text">Aa</button>
        <button class="ne-tb-btn ne-tb-aa-lg" onclick="noteEditorFontSize(5)" title="Large text">Aa</button>
        <div class="ne-tb-sep"></div>
        <!-- Expand / Print -->
        <button class="ne-tb-btn" onclick="noteEditorToggleExpand()" id="neTbExpand" title="Expand editor"><i class="pi pi-window-maximize"></i></button>
        <button class="ne-tb-btn" onclick="noteEditorPrint()" title="Print note"><i class="pi pi-print"></i></button>
        <div class="ne-tb-sep"></div>
        <!-- Medical history -->
        <button class="ne-tb-btn ne-tb-med-history" onclick="noteEditorInsertMedHistory()" title="Insert medical history snippet">
            <i class="pi pi-book"></i> Medical history
        </button>
    </div>

    <!-- Content editable area -->
    <div class="note-editor-body"
         id="noteEditorBody"
         contenteditable="true"
         spellcheck="true"
         data-placeholder="Start typing your physical examination note here…"
         onkeyup="noteEditorUpdateStatus()"
         onmouseup="noteEditorUpdateStatus()"
         onfocus="noteEditorUpdateStatus()">
    </div>

    <!-- Status bar -->
    <div class="note-editor-statusbar" id="noteEditorStatusBar">body</div>

</div>

<script src="mock-clinical-data.js"></script>
<script src="clinical-data.service.js"></script>
<script src="layout.js"></script>
<script src="doc-preview-shared.js"></script>
<script src="app.js"></script>
<script>
(function () {
    function closeAllActionDropdowns(exceptId) {
        document.querySelectorAll('.action-dropdown.open').forEach(function (el) {
            if (!exceptId || el.id !== exceptId) {
                el.classList.remove('open');
                el.classList.remove('open-up');
            }
        });
    }

    window.toggleActionDropdown = function (id) {
        var el = document.getElementById(id);
        if (!el) return;
        var isOpen = el.classList.contains('open');
        closeAllActionDropdowns(null);
        if (!isOpen) {
            el.classList.remove('open-up');
            el.classList.add('open');
            var panel = el.querySelector('.action-dropdown-panel');
            if (panel) {
                var triggerRect = el.getBoundingClientRect();
                var panelHeight = panel.offsetHeight || 300;
                var spaceBelow = window.innerHeight - triggerRect.bottom;
                if (spaceBelow < panelHeight && triggerRect.top > panelHeight) {
                    el.classList.add('open-up');
                }
            }
        }
    };

    window.selectActionDropdown = function (dropdownId, actionLabel) {
        closeAllActionDropdowns(null);
        if (typeof handleQuickAction === 'function') {
            handleQuickAction(actionLabel);
        }
    };

    document.addEventListener('click', function (e) {
        if (!e.target.closest('.action-dropdown')) {
            closeAllActionDropdowns(null);
        }
    });
}());
</script>

</body>
</html>
