<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE">ECH Patient Timeline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="css/clinical-core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/action-bar.css">
    <link rel="stylesheet" href="css/modules/timeline.css">
    <link rel="stylesheet" href="css/modules/doc-preview.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- LAYOUT: PrimeFlex grid shell. Angular equivalent: app.component.html with <router-outlet> -->
<div class="layout">

    <!-- OVERLAY: Mobile sidebar backdrop. Angular: controlled via SidebarService.isOpen$ observable -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- COMPONENT BOUNDARY: <ech-sidebar> — Injected by layout.js -->
    <!-- BEGIN: Angular Standalone Component — SidebarComponent -->
    <aside class="sidebar collapsed" id="sidebar-component"></aside>
    <!-- END: SidebarComponent -->

    <main class="main-content">

        <!-- COMPONENT BOUNDARY: <ech-header> — Injected by layout.js -->
        <!-- BEGIN: Angular Standalone Component — HeaderComponent -->
        <header class="top-bar" id="header-component"></header>
        <!-- END: HeaderComponent -->

        <!-- COMPONENT BOUNDARY: <ech-clinical-banner> — Injected by layout.js -->
        <!-- BEGIN: Angular Standalone Component — ClinicalBannerComponent -->
        <section class="clinical-banner" id="banner-component"></section>
        <!-- END: ClinicalBannerComponent -->

        <!actions bar; unique per module page -->
        <!-- BEGIN: Angular Standalone Component — ActionBarComponent -->
        <section class="action-bar" id="action-bar-component">
            <button class="action-btn action-btn-primary" onclick="handleQuickAction('Add Clinical Note')" data-i18n-title="ACTIONS.ADD_NOTE" title="Add Clinical Note">
                <i class="pi pi-plus"></i> <span data-i18n="ACTIONS.ADD_NOTE">Phisical examination</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Prescribe Medication')" data-i18n-title="ACTIONS.PRESCRIBE" title="Prescribe Medication">
                <i class="pi pi-box"></i> <span data-i18n="ACTIONS.PRESCRIBE">Medication order</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Doctors Forms')" data-i18n-title="ACTIONS.DOC_FORM" title="Doctors Forms">
                <i class="pi pi-chart-line"></i> <span data-i18n="ACTIONS.DOC_FORM">Doctors Forms</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Order Test')" data-i18n-title="ACTIONS.ORDER_TEST" title="Order Test">
                <i class="pi pi-search"></i> <span data-i18n="ACTIONS.ORDER_TEST">Diag Exam</span>
            </button>
            <div class="action-bar-separator"></div>
            <button class="action-btn" onclick="handleQuickAction('Add Diagnosis')" data-i18n-title="ACTIONS.ADD_DIAGNOSIS" title="Add Diagnosis">
                <i class="pi pi-tag"></i> <span data-i18n="ACTIONS.ADD_DIAGNOSIS">Diagnoses</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Generate Report')" data-i18n-title="ACTIONS.GENERATE_REPORT" title="Generate Report">
                <i class="pi pi-file-pdf"></i> <span data-i18n="ACTIONS.GENERATE_REPORT">Report</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Risk assesment')" data-i18n-title="ACTIONS.RISK" title="Risk assesment">
                <i class="pi pi-file-pdf"></i> <span data-i18n="ACTIONS.RISK">Risk assesment</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Logistic Request')" data-i18n-title="ACTIONS.LOG_REQ" title="Logistic Request">
                <i class="pi pi-file-pdf"></i> <span data-i18n="ACTIONS.LOG_REQ">Log Request</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Medical History')" data-i18n-title="ACTIONS.MED_HIS" title="Medical History">
                <i class="pi pi-file-pdf"></i> <span data-i18n="ACTIONS.MED_HIS">Medical History</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('Print')" data-i18n-title="ACTIONS.PRINT" title="Print">
                <i class="pi pi-file-pdf"></i> <span data-i18n="ACTIONS.PRINT">Print</span>
            </button>
        </section>
        <!-- END: ActionBarComponent -->

        <!-- FILTER BAR: Timeline-specific filters. Angular: TimelineFilterComponent -->
        <!-- BEGIN: Angular Standalone Component — FilterBarComponent -->
        <section class="filter-bar flex align-items-center gap-2 flex-wrap" id="filter-bar">
            <div class="filter-group flex align-items-center gap-1">
                <label data-i18n="FILTER.TIME"><i class="pi pi-clock"></i> Time:</label>
                <div class="select-button-group" id="time-filter">
                    <button class="sb-option fs-xs" data-value="24h" data-i18n="FILTER.24H">24h</button>
                    <button class="sb-option fs-xs" data-value="48h" data-i18n="FILTER.48H">48h</button>
                    <button class="sb-option fs-xs" data-value="7d" data-i18n="FILTER.7D">7d</button>
                    <button class="sb-option active fs-xs" data-value="full" data-i18n="FILTER.FULL_EPISODE">Full Episode</button>
                </div>
            </div>

            <div class="filter-group flex align-items-center gap-1">
                <label data-i18n="FILTER.ROLE"><i class="pi pi-users"></i> Role:</label>
                <div class="multi-select-wrapper">
                    <div class="multi-select-btn flex align-items-center gap-1 fs-xs" onclick="toggleMultiSelect()">
                        <span id="roleLabel" data-i18n="FILTER.ALL_ROLES">All Roles</span>
                        <i class="pi pi-chevron-down ml-auto text-xs"></i>
                    </div>
                    <div class="multi-select-panel" id="rolePanel">
                        <label class="ms-option"><input type="checkbox" value="All" checked onchange="updateRoleFilter(this)"> <span data-i18n="FILTER.ROLE_ALL">All</span></label>
                        <label class="ms-option"><input type="checkbox" value="Physician" onchange="updateRoleFilter(this)"> <span data-i18n="FILTER.ROLE_PHYSICIAN">Physician</span></label>
                        <label class="ms-option"><input type="checkbox" value="Nursing" onchange="updateRoleFilter(this)"> <span data-i18n="FILTER.ROLE_NURSING">Nursing</span></label>
                        <label class="ms-option"><input type="checkbox" value="Radiology" onchange="updateRoleFilter(this)"> <span data-i18n="FILTER.ROLE_RADIOLOGY">Radiology</span></label>
                        <label class="ms-option"><input type="checkbox" value="Pharmacy" onchange="updateRoleFilter(this)"> <span data-i18n="FILTER.ROLE_PHARMACY">Pharmacy</span></label>
                    </div>
                </div>
            </div>

            <div class="filter-group flex align-items-center gap-1">
                <label><i class="pi pi-tag"></i> Type:</label>
                <div class="multi-select-wrapper">
                    <div class="multi-select-btn flex align-items-center gap-1 fs-xs" onclick="toggleTypeSelect()">
                        <span id="typeLabel">All Types</span>
                        <i class="pi pi-chevron-down ml-auto text-xs"></i>
                    </div>
                    <div class="multi-select-panel" id="typePanel">
                        <label class="ms-option"><input type="checkbox" value="All" checked onchange="updateTypeFilter(this)"> All</label>
                        <label class="ms-option"><input type="checkbox" value="Document" onchange="updateTypeFilter(this)"> Document</label>
                        <label class="ms-option"><input type="checkbox" value="Note" onchange="updateTypeFilter(this)"> Note</label>
                        <label class="ms-option"><input type="checkbox" value="Exam" onchange="updateTypeFilter(this)"> Exam</label>
                        <label class="ms-option"><input type="checkbox" value="Medication" onchange="updateTypeFilter(this)"> Medication</label>
                        <label class="ms-option"><input type="checkbox" value="Images" onchange="updateTypeFilter(this)"> Images</label>
                        <label class="ms-option"><input type="checkbox" value="Care" onchange="updateTypeFilter(this)"> Care</label>
                        <label class="ms-option"><input type="checkbox" value="Surgery" onchange="updateTypeFilter(this)"> Surgery</label>
                        <label class="ms-option"><input type="checkbox" value="Vitals" onchange="updateTypeFilter(this)"> Vitals</label>
                    </div>
                </div>
            </div>

            <div class="filter-group flex-1 flex align-items-center gap-1">
                <label><i class="pi pi-search"></i></label>
                <input type="text" class="search-input w-full fs-xs" id="searchInput" placeholder="Search timeline..." data-i18n-placeholder="FILTER.SEARCH_PLACEHOLDER">
            </div>

            <div class="filter-group column-toggle-wrapper relative">
                <button class="column-toggle-btn flex align-items-center gap-1 fs-xs" onclick="toggleColumnPanel()" data-i18n-title="FILTER.COLUMNS_TITLE" title="Configure visible columns">
                    <i class="pi pi-sliders-h"></i> <span data-i18n="FILTER.COLUMNS">Columns</span>
                </button>
                <div class="column-panel" id="columnPanel">
                    <label class="col-option"><input type="checkbox" value="time" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.TIME">Time</span></label>
                    <label class="col-option"><input type="checkbox" value="type" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.TYPE">Type</span></label>
                    <label class="col-option"><input type="checkbox" value="dept" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.DEPARTMENT">Department</span></label>
                    <label class="col-option"><input type="checkbox" value="description" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.DESCRIPTION">Description</span></label>
                    <label class="col-option"><input type="checkbox" value="card" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.SERVICE_CARD">Service Card</span></label>
                    <label class="col-option"><input type="checkbox" value="actions" checked onchange="toggleColumn(this)"> <span data-i18n="COLUMN.ACTIONS">Actions</span></label>
                </div>
            </div>
        </section>
        <!-- END: FilterBarComponent -->

        <!-- Timeline docs reading modal (fixed overlay, opened when a Document entry is clicked) -->
        <div class="doc-reading-modal doc-modal-overlay" id="tl-doc-reading-modal" style="display:none">
            <div class="doc-reading-topbar">
                <button class="doc-reading-back-btn" onclick="tlCloseReadingModal()">
                    <i class="pi pi-arrow-left"></i> Back to timeline
                </button>
                <div class="doc-reading-topbar-actions">
                    <button class="doc-action-btn doc-action-download" title="Download PDF" onclick="tlHandleDocAction('download', _tlPreviewCtrl.getCurrentDocId())">
                        <i class="pi pi-file-pdf"></i>
                    </button>
                    <button class="doc-action-btn doc-action-share" title="Print" onclick="tlHandleDocAction('print', _tlPreviewCtrl.getCurrentDocId())">
                        <i class="pi pi-print"></i>
                    </button>
                </div>
            </div>
            <div class="doc-reading-content" id="tl-doc-reading-content"></div>
        </div>

        <!-- API Contract: GET /api/v1/clinical/timeline/{patientId} → TimelineEntryGroupDTO[] — Ver API_contracts.md -->

        <!-- TIMELINE CONTENT: Angular equivalent: <p-timeline> component with custom templates -->
        <section class="timeline-area" id="timeline-area">
            <div class="timeline-container" id="timelineContainer">
            </div>
        </section>

    </main>
</div>

<script src="mock-clinical-data.js"></script>
<script src="clinical-data.service.js"></script>
<script src="layout.js"></script>
<script src="doc-preview-shared.js"></script>
<script src="app.js"></script>

</body>
</html>
