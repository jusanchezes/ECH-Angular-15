<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE_PROTOCOLS">ECH Protocols</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="css/clinical-core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/action-bar.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/modules/protocols.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- BEGIN: Angular Standalone Component — SidebarComponent -->
    <aside class="sidebar collapsed" id="sidebar-component"></aside>
    <!-- END: SidebarComponent -->

    <main class="main-content">
        <!-- BEGIN: Angular Standalone Component — HeaderComponent -->
        <header class="top-bar" id="header-component"></header>
        <!-- END: HeaderComponent -->
        <!-- BEGIN: Angular Standalone Component — ClinicalBannerComponent -->
        <section class="clinical-banner" id="banner-component"></section>
        <!-- END: ClinicalBannerComponent -->

        <!-- BEGIN: Angular Standalone Component — ActionBarComponent -->
        <section class="action-bar" id="action-bar-component">
            <button class="action-btn action-btn-primary" data-i18n="PROTO.ADD_PROTOCOL" onclick="handleAddProtocol()">
                <i class="pi pi-plus"></i>
                <span>Add Protocol</span>
            </button>
            <div class="action-bar-separator"></div>
            <span class="module-search-wrapper">
                <i class="pi pi-search module-search-icon"></i>
                <input type="text" class="module-search-input" placeholder="Search by name, author or department…" data-i18n-title="PROTO.SEARCH_HINT" oninput="handleProtocolSearch(this)">
            </span>
        </section>
        <!-- END: ActionBarComponent -->

        <section class="ehr-table-area" id="module-content">
            <div class="ehr-table-scroll">
                <table class="ehr-table">
                    <thead>
                        <tr>
                            <th class="col-proto-action" data-i18n="PROTO.COL_ACTION">Action</th>
                            <th class="col-proto-date" data-i18n="PROTO.COL_CREATION_DATE">Creation Date</th>
                            <th class="col-proto-name" data-i18n="PROTO.COL_PROTOCOL_NAME">Protocol Name</th>
                            <th class="col-proto-author" data-i18n="PROTO.COL_AUTHOR">Author</th>
                            <th class="col-proto-dept" data-i18n="PROTO.COL_DEPARTMENT">Department</th>
                            <th class="col-proto-status" data-i18n="PROTO.COL_STATUS">Status</th>
                            <th class="col-proto-enddate" data-i18n="PROTO.COL_END_DATE">End Date</th>
                        </tr>
                    </thead>
                    <tbody id="protocolsTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="mock-clinical-data.js"></script>
<script src="clinical-data.service.js"></script>
<script src="layout.js"></script>
<script src="protocols.js"></script>

</body>
</html>
