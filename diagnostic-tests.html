<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE_DIAGNOSTIC_TESTS">ECH Diagnostic Tests</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="css/clinical-core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/action-bar.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/modules/diagnostic-tests.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- Angular: <app-sidebar> Standalone Component -->
    <!-- BEGIN: Angular Standalone Component — SidebarComponent -->
    <aside class="sidebar collapsed" id="sidebar-component"></aside>
    <!-- END: SidebarComponent -->

    <main class="main-content">
        <!-- Angular: <app-header> Standalone Component -->
        <!-- BEGIN: Angular Standalone Component — HeaderComponent -->
        <header class="top-bar" id="header-component"></header>
        <!-- END: HeaderComponent -->
        <!-- Angular: <app-clinical-banner> Standalone Component -->
        <!-- BEGIN: Angular Standalone Component — ClinicalBannerComponent -->
        <section class="clinical-banner" id="banner-component"></section>
        <!-- END: ClinicalBannerComponent -->

        <!-- Angular: Action bar with p-button components for exam creation -->
        <!-- PrimeFlex: flex row with gap for high-density action buttons -->
        <!-- BEGIN: Angular Standalone Component — ActionBarComponent -->
        <section class="action-bar" id="action-bar-component">
            <button class="action-btn action-btn-primary" data-i18n="CO.CREATE_RADIOLOGY" onclick="handleCreateExam('radiology')">
                <i class="pi pi-plus"></i>
                <span>Create Radiology Exam</span>
            </button>
            <button class="action-btn action-btn-primary" data-i18n="CO.CREATE_LABORATORY" onclick="handleCreateExam('laboratory')">
                <i class="pi pi-plus"></i>
                <span>Create Laboratory Exam</span>
            </button>
            <button class="action-btn action-btn-primary" data-i18n="CO.CREATE_PATHOLOGY" onclick="handleCreateExam('pathology')">
                <i class="pi pi-plus"></i>
                <span>Create Pathology Exam</span>
            </button>
        </section>
        <!-- END: ActionBarComponent -->

        <!-- BEGIN: Angular Standalone Component — FilterBarComponent -->
        <section class="filter-bar flex align-items-center gap-2 flex-wrap" id="filter-bar">
            <div class="filter-group">
                <label data-i18n="CO.TEST_TYPE">Test Type:</label>
                <div class="select-button-group" id="coTestType">
                    <button class="sb-option active" data-value="all" onclick="setTestTypeFilter(this)" data-i18n="CO.TYPE_ALL">All</button>
                    <button class="sb-option" data-value="laboratory" onclick="setTestTypeFilter(this)" data-i18n="CO.TYPE_LABORATORY">Laboratory</button>
                    <button class="sb-option" data-value="radiology" onclick="setTestTypeFilter(this)" data-i18n="CO.TYPE_RADIOLOGY">Radiology</button>
                    <button class="sb-option" data-value="pathology" onclick="setTestTypeFilter(this)" data-i18n="CO.TYPE_PATHOLOGY">Pathology</button>
                </div>
            </div>
        </section>
        <!-- END: FilterBarComponent -->

        <!-- Angular: <app-clinical-orders-table> using p-table with p-datatable-sm -->
        <!-- PrimeFlex: flex-1 overflow container for scrollable high-density data grid -->
        <section class="ehr-table-area" id="module-content">
            <div class="ehr-table-scroll">
                <!-- Angular: <p-table [value]="orders" styleClass="p-datatable-sm"> -->
                <table class="ehr-table">
                    <thead>
                        <tr>
                            <!-- data-field maps to ClinicalOrderDTO fields -->
                            <th class="col-co-date" data-i18n="CO.COL_REQUEST_DATE">Request Date</th>
                            <th class="col-co-type" data-i18n="CO.COL_TEST_TYPE">Test Type</th>
                            <th class="col-co-request" data-i18n="CO.COL_REQUEST">Request</th>
                            <th class="col-co-comment" data-i18n="CO.COL_COMMENT">Comment</th>
                            <th class="col-co-see-request" data-i18n="CO.COL_SEE_REQUEST">See Request</th>
                            <th class="col-co-author" data-i18n="CO.COL_AUTHOR">Author</th>
                            <th class="col-co-result-date" data-i18n="CO.COL_RESULT_DATE">Result Date</th>
                            <th class="col-co-see-result" data-i18n="CO.COL_SEE_RESULT">See Result</th>
                            <th class="col-co-access-web" data-i18n="CO.COL_ACCESS_WEB">Access Web</th>
                            <th class="col-co-action" data-i18n="CO.COL_ACTION">Action</th>
                        </tr>
                    </thead>
                    <!-- Angular: <ng-template pTemplate="body" let-order> -->
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="mock-clinical-data.js"></script>
<script src="clinical-data.service.js"></script>
<script src="layout.js"></script>
<script src="diagnostic-tests.js"></script>

</body>
</html>
