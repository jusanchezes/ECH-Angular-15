<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE_DOCUMENTS">ECH Documents</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="theme-overrides.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar collapsed" id="sidebar-component"></aside>

    <main class="main-content">
        <header class="top-bar" id="header-component"></header>
        <section class="clinical-banner" id="banner-component"></section>

        <!-- Angular: p-selectButton for document category filtering -->
        <!-- PrimeFlex: filter-bar with select-button-group matching MAR filter pattern -->
        <section class="filter-bar flex align-items-center gap-2 flex-wrap" id="doc-filters-bar">
            <div class="select-button-group" id="docTabs">
                <button class="sb-option active" data-filter="all" onclick="filterDocuments('all')">All</button>
                <button class="sb-option" data-filter="reports" onclick="filterDocuments('reports')">Reports</button>
                <button class="sb-option" data-filter="informed-consent" onclick="filterDocuments('informed-consent')">Informed Consent</button>
                <button class="sb-option" data-filter="various" onclick="filterDocuments('various')">Various</button>
                <button class="sb-option" data-filter="digital-history" onclick="filterDocuments('digital-history')">Digital History</button>
                <button class="sb-option" data-filter="signed" onclick="filterDocuments('signed')">Signed Documents</button>
            </div>
            <div class="doc-search-area" style="margin-left:auto">
                <div class="doc-search-wrapper">
                    <i class="pi pi-search doc-search-icon"></i>
                    <input type="text" class="doc-search-input" placeholder="Search documents..." id="docSearchInput" oninput="searchDocuments(this.value)">
                </div>
                <span class="doc-count-badge" id="docCountBadge">8</span>
            </div>
        </section>

        <section class="doc-table-area" id="doc-table-area">
            <div class="doc-table-scroll">
                <table class="doc-table" id="docTable">
                    <thead>
                        <tr>
                            <th class="col-doc-name">Name <i class="pi pi-sort-alt sort-icon"></i></th>
                            <th class="col-doc-author">Author <i class="pi pi-sort-alt sort-icon"></i></th>
                            <th class="col-doc-dept">Department <i class="pi pi-sort-alt sort-icon"></i></th>
                            <th class="col-doc-type">Type <i class="pi pi-sort-alt sort-icon"></i></th>
                            <th class="col-doc-date">Date <i class="pi pi-sort-alt sort-icon"></i></th>
                            <th class="col-doc-status">Status</th>
                            <th class="col-doc-access">Access Web</th>
                            <th class="col-doc-actions">Action</th>
                        </tr>
                    </thead>
                    <tbody id="docTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="layout.js"></script>
<script src="documents.js"></script>

</body>
</html>
