<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE_DOCUMENTS">ECH Documents</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="css/clinical-core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/action-bar.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/modules/documents.css">
    <link rel="stylesheet" href="css/modules/doc-preview.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- BEGIN: Angular Standalone Component — SidebarComponent -->
    <aside class="sidebar collapsed" id="sidebar-component"></aside>
    <!-- END: SidebarComponent -->

    <main class="main-content">
        <!-- BEGIN: Angular Standalone Component — HeaderComponent -->
        <header class="top-bar" id="header-component"></header>
        <!-- END: HeaderComponent -->
        <!-- BEGIN: Angular Standalone Component — ClinicalBannerComponent -->
        <section class="clinical-banner" id="banner-component"></section>
        <!-- END: ClinicalBannerComponent -->

        <!-- Angular: p-selectButton for document category filtering -->
        <!-- PrimeFlex: filter-bar with select-button-group matching MAR filter pattern -->
        <section class="filter-bar flex align-items-center gap-2 flex-wrap" id="doc-filters-bar">
            <label data-i18n="MAR.DOC_TYPE">Type:</label>
            <div class="select-button-group" id="docTabs">
                <button class="sb-option active" data-filter="all" onclick="filterDocuments('all')">All</button>
                <button class="sb-option" data-filter="reports" onclick="filterDocuments('reports')">Reports</button>
                <button class="sb-option" data-filter="informed-consent" onclick="filterDocuments('informed-consent')">Informed Consent</button>
                <button class="sb-option" data-filter="various" onclick="filterDocuments('various')">Various</button>
                <button class="sb-option" data-filter="digital-history" onclick="filterDocuments('digital-history')">Digital History</button>
                <button class="sb-option" data-filter="signed" onclick="filterDocuments('signed')">Signed Documents</button>
            </div>
            <div class="doc-search-area" style="margin-left:auto">
                <div class="doc-search-wrapper">
                    <i class="pi pi-search doc-search-icon"></i>
                    <input type="text" class="doc-search-input" placeholder="Search documents..." id="docSearchInput" oninput="searchDocuments(this.value)">
                </div>
                <span class="doc-count-badge" id="docCountBadge">12</span>
            </div>
        </section>

        <!-- Quick filter chips row -->
        <section class="doc-quick-filters-bar" id="doc-quick-filters-bar">
            <div class="doc-quick-filters" id="docQuickFilters">
                <button class="doc-qf-chip active" data-qf="all" onclick="setQuickFilter('all')">
                    <i class="pi pi-list"></i> All
                </button>
                <button class="doc-qf-chip" data-qf="current-encounter" onclick="setQuickFilter('current-encounter')">
                    <i class="pi pi-calendar"></i> Current Encounter
                </button>
                <button class="doc-qf-chip" data-qf="current-admission" onclick="setQuickFilter('current-admission')">
                    <i class="pi pi-building"></i> Current Admission
                </button>
                <button class="doc-qf-chip" data-qf="all-history" onclick="setQuickFilter('all-history')">
                    <i class="pi pi-history"></i> All History
                </button>
                <button class="doc-qf-chip" data-qf="latest-reports" onclick="setQuickFilter('latest-reports')">
                    <i class="pi pi-clock"></i> Latest Reports
                </button>
                <button class="doc-qf-chip doc-qf-draft" data-qf="draft-only" onclick="setQuickFilter('draft-only')">
                    <i class="pi pi-pencil"></i> Draft Only
                </button>
                <button class="doc-qf-chip doc-qf-signed" data-qf="signed-only" onclick="setQuickFilter('signed-only')">
                    <i class="pi pi-check-circle"></i> Signed Only
                </button>
            </div>
        </section>

        <!-- API Contract: GET /api/v1/clinical/documents/{patientId} → ClinicalDocumentDTO[] — Ver API_contracts.md -->
        <!-- Document workspace: table pane + preview pane side-by-side -->
        <div class="doc-workspace" id="doc-workspace">

            <section class="ehr-table-area doc-table-pane" id="doc-table-area">
                <div class="ehr-table-scroll">
                    <table class="ehr-table" id="docTable">
                        <thead>
                            <tr>
                                <th class="col-doc-key"></th>
                                <th class="col-doc-name">Name <i class="pi pi-sort-alt sort-icon"></i></th>
                                <th class="col-doc-author">Author <i class="pi pi-sort-alt sort-icon"></i></th>
                                <th class="col-doc-dept">Department <i class="pi pi-sort-alt sort-icon"></i></th>
                                <th class="col-doc-type">Type <i class="pi pi-sort-alt sort-icon"></i></th>
                                <th class="col-doc-date">Date <i class="pi pi-sort-alt sort-icon"></i></th>
                                <th class="col-doc-status">Status</th>
                                <th class="col-doc-encounter">Encounter</th>
                                <th class="col-doc-access">Web</th>
                                <th class="col-doc-actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="docTableBody"></tbody>
                    </table>
                </div>
            </section>

            <!-- Right-side document preview panel -->
            <aside class="doc-preview-pane" id="doc-preview-pane" style="display:none">
                <div class="doc-preview-header">
                    <div class="doc-preview-header-actions">
                        <button class="doc-preview-action-btn doc-preview-expand-btn" title="Expand to reading mode" onclick="openReadingModal()">
                            <i class="pi pi-window-maximize"></i> Expand
                        </button>
                        <button class="doc-preview-close-btn" title="Close preview" onclick="closeDocPreview()">
                            <i class="pi pi-times"></i>
                        </button>
                    </div>
                </div>

                <div class="doc-preview-body" id="doc-preview-body">
                    <!-- filled by JS -->
                </div>
            </aside>

        </div>

        <!-- Full reading modal (replaces workspace when expanded) -->
        <div class="doc-reading-modal" id="doc-reading-modal" style="display:none">
            <div class="doc-reading-topbar">
                <button class="doc-reading-back-btn" onclick="closeReadingModal()">
                    <i class="pi pi-arrow-left"></i> Back to table
                </button>
                <div class="doc-reading-topbar-actions">
                    <button class="doc-action-btn doc-action-download" title="Download PDF" onclick="handleDocAction('download', _docCtrl.getCurrentDocId())">
                        <i class="pi pi-file-pdf"></i>
                    </button>
                    <button class="doc-action-btn doc-action-share" title="Print" onclick="handleDocAction('print', _docCtrl.getCurrentDocId())">
                        <i class="pi pi-print"></i>
                    </button>
                </div>
            </div>
            <div class="doc-reading-content" id="doc-reading-content">
                <!-- filled by JS -->
            </div>
        </div>

    </main>
</div>

<script src="mock-clinical-data.js"></script>
<script src="clinical-data.service.js"></script>
<script src="layout.js"></script>
<script src="doc-preview-shared.js"></script>
<script src="documents.js"></script>

</body>
</html>
