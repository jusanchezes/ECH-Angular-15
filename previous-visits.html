<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE_PREVIOUS_VISITS">ECH Previous Visits</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="css/clinical-core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/action-bar.css">
    <link rel="stylesheet" href="css/modules/patient-summary.css">
    <link rel="stylesheet" href="css/modules/doc-preview.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        /* Previous Visits docs table column widths */
        .pv-doc-col-key      { width: 28px; text-align: center; }
        .pv-doc-col-name     { min-width: 150px; }
        .pv-doc-col-author   { min-width: 120px; }
        .pv-doc-col-dept     { min-width: 100px; }
        .pv-doc-col-type     { min-width: 100px; }
        .pv-doc-col-date     { min-width: 100px; white-space: nowrap; }
        .pv-doc-col-status   { width: 86px; text-align: center; }
        .pv-doc-col-encounter { min-width: 100px; }
        .pv-doc-col-actions  { width: 62px; text-align: center; }

        /* Previous Visits three-column split when preview is open */
        .pv-split {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .pv-split.pv-preview-open .pv-detail {
            flex: 1 1 50%;
            min-width: 0;
        }
        .pv-split .pv-doc-preview-pane {
            border-left: 1px solid var(--ech-border);
        }

        /* Documents & Notes panel within episode detail */
        .pv-docs-panel {
            margin-top: 8px;
        }
        .pv-docs-panel .pv-panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pv-docs-panel .pv-panel-header i {
            color: var(--ech-primary);
        }
        .pv-docs-empty {
            padding: 20px;
            text-align: center;
            color: var(--ech-text-secondary);
            font-size: var(--fs-sm);
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- BEGIN: Angular Standalone Component — SidebarComponent -->
    <aside class="sidebar collapsed" id="sidebar-component"></aside>
    <!-- END: SidebarComponent -->

    <main class="main-content">
        <!-- BEGIN: Angular Standalone Component — HeaderComponent -->
        <header class="top-bar" id="header-component"></header>
        <!-- END: HeaderComponent -->
        <!-- BEGIN: Angular Standalone Component — ClinicalBannerComponent -->
        <section class="clinical-banner" id="banner-component"></section>
        <!-- END: ClinicalBannerComponent -->

        <!-- BEGIN: Angular Standalone Component — ActionBarComponent -->
        <section class="action-bar" id="action-bar-component">
            <button class="action-btn action-btn-primary" onclick="handleQuickAction('generate-summary')">
                <i class="pi pi-file-edit"></i>
                <span data-i18n="ACTION.GENERATE_SUMMARY">Generate Summary</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('print-episode')">
                <i class="pi pi-print"></i>
                <span data-i18n="ACTION.PRINT_EPISODE">Print Episode Report</span>
            </button>
        </section>
        <!-- END: ActionBarComponent -->

        <!-- API Contract: GET /api/v1/clinical/previous-visits/{patientId} → PreviousVisitDTO[] — Ver API_contracts.md -->
        <section class="module-content-area pv-no-padding" id="module-content">
            <div class="pv-split" id="pvSplit">

                <div class="pv-episode-list" id="pvEpisodeList"></div>

                <div class="pv-detail" id="pvDetail"></div>

                <!-- Right-side document preview pane — shown when a doc row is clicked -->
                <aside class="doc-preview-pane pv-doc-preview-pane" id="pv-doc-preview-pane" style="display:none">
                    <div class="doc-preview-header">
                        <div class="doc-preview-header-actions">
                            <button class="doc-preview-action-btn doc-preview-expand-btn" title="Expand to reading mode" onclick="pvOpenReadingModal()">
                                <i class="pi pi-window-maximize"></i> Expand
                            </button>
                            <button class="doc-preview-close-btn" title="Close preview" onclick="pvCloseDocPreview()">
                                <i class="pi pi-times"></i>
                            </button>
                        </div>
                    </div>
                    <div class="doc-preview-body" id="pv-doc-preview-body"></div>
                </aside>

            </div>
        </section>

        <!-- Previous Visits docs reading modal (fixed overlay) -->
        <div class="doc-reading-modal doc-modal-overlay" id="pv-doc-reading-modal" style="display:none">
            <div class="doc-reading-topbar">
                <button class="doc-reading-back-btn" onclick="pvCloseReadingModal()">
                    <i class="pi pi-arrow-left"></i> Back to episode
                </button>
                <div class="doc-reading-topbar-actions">
                    <button class="doc-action-btn doc-action-download" title="Download PDF" onclick="pvHandleDocAction('download', pvCurrentPreviewDocId)">
                        <i class="pi pi-file-pdf"></i>
                    </button>
                    <button class="doc-action-btn doc-action-share" title="Print" onclick="pvHandleDocAction('print', pvCurrentPreviewDocId)">
                        <i class="pi pi-print"></i>
                    </button>
                </div>
            </div>
            <div class="doc-reading-content" id="pv-doc-reading-content"></div>
        </div>

    </main>
</div>

<script src="mock-clinical-data.js"></script>
<script src="clinical-data.service.js"></script>
<script src="layout.js"></script>
<script src="doc-preview-shared.js"></script>
<script>
(function() {
    var visits = ClinicalDataService.getPreviousVisits();
    var pvCurrentEpisodeIndex = 0;
    var pvCurrentEpisodeDocs = [];

    /* Lifecycle controller (DocPreview.createController from doc-preview-shared.js) */
    var pvCtrl = DocPreview.createController({
        getData: function() { return pvCurrentEpisodeDocs; },
        previewPaneId: 'pv-doc-preview-pane',
        previewBodyId: 'pv-doc-preview-body',
        containerId: 'pvSplit',
        previewOpenClass: 'pv-preview-open',
        getPreviewFooterHtml: function(doc) {
            return '<div class="doc-preview-footer">' +
                '<button class="doc-preview-footer-btn" onclick="pvHandleDocAction(\'download\',\'' + doc.id + '\')"><i class="pi pi-file-pdf"></i> Download PDF</button>' +
                '<button class="doc-preview-footer-btn" onclick="pvHandleDocAction(\'print\',\'' + doc.id + '\')"><i class="pi pi-print"></i> Print</button>' +
                '</div>';
        },
        modalId: 'pv-doc-reading-modal',
        modalContentId: 'pv-doc-reading-content'
    });

    /* ------------------------------------------------------------------
       Episode list
    ------------------------------------------------------------------ */
    function renderEpisodeList() {
        var listEl = document.getElementById('pvEpisodeList');
        if (!listEl || !visits.length) return;
        listEl.innerHTML = visits.map(function(v, i) {
            return '<div class="pv-episode-item' + (i === 0 ? ' active' : '') + '" data-episode="' + i + '" onclick="selectEpisode(this, ' + i + ')">' +
                '<div class="pv-episode-date">' + v.episodeDate + '</div>' +
                '<div class="pv-episode-type">' + v.episodeType + '</div>' +
            '</div>';
        }).join('');
    }

    /* ------------------------------------------------------------------
       Episode detail
    ------------------------------------------------------------------ */
    function renderEpisodeDetail(index) {
        var detailEl = document.getElementById('pvDetail');
        if (!detailEl) return;
        var v = visits[index];
        if (!v) { detailEl.innerHTML = ''; return; }

        /* Close preview pane when switching episodes */
        pvCloseDocPreviewInternal();

        pvCurrentEpisodeIndex = index;
        pvCurrentEpisodeDocs = v.documents || [];

        var html = '';

        if (v.alerts && v.alerts.length) {
            html += '<div class="pv-panel"><div class="pv-panel-header">Active Alerts &amp; Risks</div><div class="pv-panel-body">';
            v.alerts.forEach(function(a) {
                html += '<div class="pv-alert-row"><span>' + a.name + '</span><span class="pv-alert-doctor">' + a.doctor + '</span></div>';
            });
            html += '</div></div>';
        }

        if (v.diagnoses && v.diagnoses.length) {
            html += '<div class="pv-panel"><div class="pv-panel-header">Active Problems / Diagnoses</div><div class="pv-panel-body"><table class="pv-diag-table">';
            v.diagnoses.forEach(function(d) {
                var badgeClass = d.status === 'Active' ? 'pv-badge-active' : 'pv-badge-resolved';
                html += '<tr><td class="pv-diag-code">' + (d.code || '') + '</td><td>' + d.name + '</td><td style="text-align:right"><span class="pv-badge ' + badgeClass + '">' + d.status + '</span></td></tr>';
            });
            html += '</table></div></div>';
        }

        if (v.medications && v.medications.length) {
            html += '<div class="pv-panel"><div class="pv-panel-header">Active Medication</div><div class="pv-panel-body">';
            v.medications.forEach(function(m) {
                var hrBadge = m.highRisk ? '<span class="pv-badge-high-risk">High Risk</span>' : '';
                html += '<div class="pv-med-row"><div class="pv-med-name"><span>' + m.name + '</span>' + hrBadge + '</div><span class="pv-med-dose-time">Last dose: ' + m.lastDose + '</span></div>';
            });
            html += '</div></div>';
        }

        if (v.vitalsSnapshot) {
            var vs = v.vitalsSnapshot;
            html += '<div class="pv-panel"><div class="pv-panel-header">24h Clinical Snapshot</div><div class="pv-panel-body"><div class="pv-snapshot-grid">';
            [
                { label: 'BP:', value: vs.bp },
                { label: 'HR:', value: vs.hr },
                { label: 'SpO2:', value: vs.spo2 },
                { label: 'Temp:', value: vs.temp },
                { label: 'Urine:', value: vs.urine },
                { label: 'Balance:', value: vs.balance }
            ].forEach(function(it) {
                html += '<div class="pv-snapshot-item"><span class="pv-snapshot-label">' + it.label + '</span><span class="pv-snapshot-value">' + it.value + '</span></div>';
            });
            html += '</div></div></div>';
        }

        if (v.pendingTests && v.pendingTests.length) {
            html += '<div class="pv-panel"><div class="pv-panel-header pv-panel-header-link">Pending Tests &amp; Abnormal Results</div><div class="pv-panel-body">';
            v.pendingTests.forEach(function(t) {
                var badgeClass = t.status === 'Pending' ? 'pv-badge-pending' : 'pv-badge-abnormal';
                html += '<div class="pv-test-row"><span>' + t.name + '</span><span class="' + badgeClass + '">' + t.status + '</span></div>';
            });
            html += '</div></div>';
        }

        /* Documents & Notes panel */
        html += '<div class="pv-panel pv-docs-panel">';
        html += '<div class="pv-panel-header"><i class="pi pi-file-edit"></i> Documents &amp; Notes</div>';
        html += '<div class="pv-panel-body" style="padding:0">';

        if (!pvCurrentEpisodeDocs.length) {
            html += '<div class="pv-docs-empty"><i class="pi pi-inbox"></i><br>No documents for this episode</div>';
        } else {
            html += '<div class="ehr-table-scroll">';
            html += '<table class="ehr-table">';
            html += '<thead><tr>';
            html += '<th class="pv-doc-col-key"></th>';
            html += '<th class="pv-doc-col-name">Name</th>';
            html += '<th class="pv-doc-col-author">Author</th>';
            html += '<th class="pv-doc-col-dept">Department</th>';
            html += '<th class="pv-doc-col-type">Type</th>';
            html += '<th class="pv-doc-col-date">Date</th>';
            html += '<th class="pv-doc-col-status">Status</th>';
            html += '<th class="pv-doc-col-encounter">Encounter</th>';
            html += '<th class="pv-doc-col-actions">Actions</th>';
            html += '</tr></thead>';
            html += '<tbody id="pvDocTableBody">';
            html += pvRenderDocRows(pvCurrentEpisodeDocs, null);
            html += '</tbody>';
            html += '</table></div>';
        }

        html += '</div></div>';

        detailEl.innerHTML = html;
    }

    /* ------------------------------------------------------------------
       Doc table rows
    ------------------------------------------------------------------ */
    function pvRenderDocRows(docs, activeDocId) {
        var resolvedActiveId = activeDocId !== undefined ? activeDocId : pvCtrl.getCurrentDocId();
        return docs.map(function(doc) {
            var keyStar = doc.keyDocument
                ? '<span class="doc-key-star" title="Key clinical document"><i class="pi pi-star-fill"></i></span>'
                : '';
            var statusTag = DocPreview.getStatusTag(doc.status);
            var isActive = doc.id === resolvedActiveId ? ' doc-row-active' : '';
            var encounterLabel = (doc.encounter || doc.admission)
                ? '<span class="doc-encounter-badge">' + (doc.encounter || doc.admission) + '</span>'
                : '<span style="color:var(--ech-text-muted)">—</span>';

            return '<tr class="ehr-row doc-table-row' + isActive + '" onclick="pvOpenDocPreview(\'' + doc.id + '\')">' +
                '<td class="pv-doc-col-key">' + keyStar + '</td>' +
                '<td class="pv-doc-col-name"><a href="#" class="doc-link" onclick="pvOpenDocPreview(\'' + doc.id + '\');return false">' + doc.name + '</a></td>' +
                '<td class="pv-doc-col-author">' + doc.author + '</td>' +
                '<td class="pv-doc-col-dept">' + doc.department + '</td>' +
                '<td class="pv-doc-col-type">' + doc.type + '</td>' +
                '<td class="pv-doc-col-date">' + doc.date + '</td>' +
                '<td class="pv-doc-col-status">' + statusTag + '</td>' +
                '<td class="pv-doc-col-encounter">' + encounterLabel + '</td>' +
                '<td class="pv-doc-col-actions">' +
                    '<div class="doc-actions-group">' +
                        '<button class="doc-action-btn doc-action-download" title="Download PDF" onclick="event.stopPropagation();pvHandleDocAction(\'download\',\'' + doc.id + '\')"><i class="pi pi-file-pdf"></i></button>' +
                        '<button class="doc-action-btn doc-action-share" title="Print" onclick="event.stopPropagation();pvHandleDocAction(\'print\',\'' + doc.id + '\')"><i class="pi pi-print"></i></button>' +
                    '</div>' +
                '</td>' +
            '</tr>';
        }).join('');
    }

    /* ------------------------------------------------------------------
       Preview pane — delegates lifecycle to pvCtrl (DocPreview.createController)
    ------------------------------------------------------------------ */
    window.pvOpenDocPreview = function(docId) {
        pvCtrl.openPreview(docId);
        /* Refresh active row highlight */
        var tbody = document.getElementById('pvDocTableBody');
        if (tbody) tbody.innerHTML = pvRenderDocRows(pvCurrentEpisodeDocs, docId);
    };

    /* Used internally when switching episodes — no table refresh needed */
    function pvCloseDocPreviewInternal() {
        pvCtrl.closePreview();
    }

    window.pvCloseDocPreview = function() {
        pvCtrl.closePreview();
        /* Refresh active-row highlight */
        var tbody = document.getElementById('pvDocTableBody');
        if (tbody) tbody.innerHTML = pvRenderDocRows(pvCurrentEpisodeDocs, null);
    };

    /* ------------------------------------------------------------------
       Reading modal — delegates lifecycle to pvCtrl
    ------------------------------------------------------------------ */
    window.pvOpenReadingModal = function() {
        pvCtrl.openModal();
    };

    window.pvCloseReadingModal = function() {
        pvCtrl.closeModal();
    };

    /* ------------------------------------------------------------------
       Actions (prototype — console only)
    ------------------------------------------------------------------ */
    window.pvHandleDocAction = function(action, docId) {
        var doc = pvCurrentEpisodeDocs.find(function(d) { return d.id === docId; });
        if (!doc) return;
        console.log('PV doc action:', action, 'on "' + doc.name + '" (ID: ' + docId + ')');
    };

    /* ------------------------------------------------------------------
       Episode selection
    ------------------------------------------------------------------ */
    window.selectEpisode = function(el, index) {
        var items = document.querySelectorAll('.pv-episode-item');
        for (var i = 0; i < items.length; i++) {
            items[i].classList.remove('active');
        }
        el.classList.add('active');
        renderEpisodeDetail(index);
    };

    /* ------------------------------------------------------------------
       Init
    ------------------------------------------------------------------ */
    function init() {
        renderEpisodeList();
        if (visits.length) renderEpisodeDetail(0);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

</body>
</html>
