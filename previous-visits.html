<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE_PREVIOUS_VISITS">ECH Previous Visits</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="css/clinical-core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/action-bar.css">
    <link rel="stylesheet" href="css/modules/patient-summary.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- BEGIN: Angular Standalone Component — SidebarComponent -->
    <aside class="sidebar collapsed" id="sidebar-component"></aside>
    <!-- END: SidebarComponent -->

    <main class="main-content">
        <!-- BEGIN: Angular Standalone Component — HeaderComponent -->
        <header class="top-bar" id="header-component"></header>
        <!-- END: HeaderComponent -->
        <!-- BEGIN: Angular Standalone Component — ClinicalBannerComponent -->
        <section class="clinical-banner" id="banner-component"></section>
        <!-- END: ClinicalBannerComponent -->

        <!-- BEGIN: Angular Standalone Component — ActionBarComponent -->
        <section class="action-bar" id="action-bar-component">
            <button class="action-btn action-btn-primary" onclick="handleQuickAction('generate-summary')">
                <i class="pi pi-file-edit"></i>
                <span data-i18n="ACTION.GENERATE_SUMMARY">Generate Summary</span>
            </button>
            <button class="action-btn" onclick="handleQuickAction('print-episode')">
                <i class="pi pi-print"></i>
                <span data-i18n="ACTION.PRINT_EPISODE">Print Episode Report</span>
            </button>
        </section>
        <!-- END: ActionBarComponent -->

        <!-- API Contract: GET /api/v1/clinical/previous-visits/{patientId} → PreviousVisitDTO[] — Ver API_contracts.md -->
        <section class="module-content-area pv-no-padding" id="module-content">
            <div class="pv-split">

                <div class="pv-episode-list" id="pvEpisodeList">
                </div>

                <div class="pv-detail" id="pvDetail">
                </div>

            </div>
        </section>
    </main>
</div>

<script src="mock-clinical-data.js"></script>
<script src="clinical-data.service.js"></script>
<script src="layout.js"></script>
<script>
(function() {
    var visits = ClinicalDataService.getPreviousVisits();

    function renderEpisodeList() {
        var listEl = document.getElementById('pvEpisodeList');
        if (!listEl || !visits.length) return;
        listEl.innerHTML = visits.map(function(v, i) {
            return '<div class="pv-episode-item' + (i === 0 ? ' active' : '') + '" data-episode="' + i + '" onclick="selectEpisode(this, ' + i + ')">' +
                '<div class="pv-episode-date">' + v.episodeDate + '</div>' +
                '<div class="pv-episode-type">' + v.episodeType + '</div>' +
            '</div>';
        }).join('');
    }

    function renderEpisodeDetail(index) {
        var detailEl = document.getElementById('pvDetail');
        if (!detailEl) return;
        var v = visits[index];
        if (!v) { detailEl.innerHTML = ''; return; }

        var html = '';

        if (v.alerts && v.alerts.length) {
            html += '<div class="pv-panel"><div class="pv-panel-header">Active Alerts &amp; Risks</div><div class="pv-panel-body">';
            v.alerts.forEach(function(a) {
                html += '<div class="pv-alert-row"><span>' + a.name + '</span><span class="pv-alert-doctor">' + a.doctor + '</span></div>';
            });
            html += '</div></div>';
        }

        if (v.diagnoses && v.diagnoses.length) {
            html += '<div class="pv-panel"><div class="pv-panel-header">Active Problems / Diagnoses</div><div class="pv-panel-body"><table class="pv-diag-table">';
            v.diagnoses.forEach(function(d) {
                var badgeClass = d.status === 'Active' ? 'pv-badge-active' : 'pv-badge-resolved';
                html += '<tr><td class="pv-diag-code">' + (d.code || '') + '</td><td>' + d.name + '</td><td style="text-align:right"><span class="pv-badge ' + badgeClass + '">' + d.status + '</span></td></tr>';
            });
            html += '</table></div></div>';
        }

        if (v.medications && v.medications.length) {
            html += '<div class="pv-panel"><div class="pv-panel-header">Active Medication</div><div class="pv-panel-body">';
            v.medications.forEach(function(m) {
                var hrBadge = m.highRisk ? '<span class="pv-badge-high-risk">High Risk</span>' : '';
                html += '<div class="pv-med-row"><div class="pv-med-name"><span>' + m.name + '</span>' + hrBadge + '</div><span class="pv-med-dose-time">Last dose: ' + m.lastDose + '</span></div>';
            });
            html += '</div></div>';
        }

        if (v.vitalsSnapshot) {
            var vs = v.vitalsSnapshot;
            html += '<div class="pv-panel"><div class="pv-panel-header">24h Clinical Snapshot</div><div class="pv-panel-body"><div class="pv-snapshot-grid">';
            var items = [
                { label: 'BP:', value: vs.bp },
                { label: 'HR:', value: vs.hr },
                { label: 'SpO2:', value: vs.spo2 },
                { label: 'Temp:', value: vs.temp },
                { label: 'Urine:', value: vs.urine },
                { label: 'Balance:', value: vs.balance }
            ];
            items.forEach(function(it) {
                html += '<div class="pv-snapshot-item"><span class="pv-snapshot-label">' + it.label + '</span><span class="pv-snapshot-value">' + it.value + '</span></div>';
            });
            html += '</div></div></div>';
        }

        if (v.pendingTests && v.pendingTests.length) {
            html += '<div class="pv-panel"><div class="pv-panel-header pv-panel-header-link">Pending Tests &amp; Abnormal Results</div><div class="pv-panel-body">';
            v.pendingTests.forEach(function(t) {
                var badgeClass = t.status === 'Pending' ? 'pv-badge-pending' : 'pv-badge-abnormal';
                html += '<div class="pv-test-row"><span>' + t.name + '</span><span class="' + badgeClass + '">' + t.status + '</span></div>';
            });
            html += '</div></div>';
        }

        detailEl.innerHTML = html;
    }

    window.selectEpisode = function(el, index) {
        var items = document.querySelectorAll('.pv-episode-item');
        for (var i = 0; i < items.length; i++) {
            items[i].classList.remove('active');
        }
        el.classList.add('active');
        renderEpisodeDetail(index);
    };

    function init() {
        renderEpisodeList();
        if (visits.length) renderEpisodeDetail(0);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

</body>
</html>
