<html lang="en">
<head>

    <title data-i18n="APP.PAGE_TITLE_MEDICATION">ECH Medication (MAR)</title>

    <style>
        .mar-action-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .mar-filter-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 8px;
        }

        .mar-filter-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mar-date-nav {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mar-date-nav .date-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border: 1px solid var(--ech-border);
            border-radius: 4px;
            background: var(--ech-surface);
            color: var(--ech-text);
            font-size: var(--fs-xs);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: var(--ech-font-family);
        }

        .mar-date-nav .date-nav-btn:hover {
            background: var(--ech-primary-light);
            border-color: var(--ech-primary);
            color: var(--ech-primary-dark);
        }

        .mar-date-nav .date-label {
            font-weight: 700;
            font-size: var(--fs-md);
            color: var(--ech-text);
            white-space: nowrap;
        }

        .mar-legend {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: var(--fs-xs);
            color: var(--ech-text-secondary);
            flex-shrink: 0;
        }

        .mar-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .mar-legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .mar-legend-swatch.given { background: #e8f5e9; border: 1px solid #a5d6a7; }
        .mar-legend-swatch.due { background: #ffffff; border: 1px dashed var(--ech-border); }
        .mar-legend-swatch.hold { background: #fff3e0; border: 1px solid #ffcc80; }
        .mar-legend-swatch.not-given { background: #ffebee; border: 1px solid #ef9a9a; }
        .mar-legend-swatch.cancelled { background: #f5f5f5; border: 1px solid #bdbdbd; }

        .mar-grid-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 0 10px 10px;
        }

        .mar-table-container {
            flex: 1;
            overflow: auto;
            border: 1px solid var(--ech-border);
            border-radius: 4px;
            background: var(--ech-surface);
            position: relative;
        }

        .mar-table {
            border-collapse: separate;
            border-spacing: 0;
            width: max-content;
            min-width: 100%;
            font-size: var(--fs-md);
        }

        .mar-table thead th {
            background: var(--ech-primary-light);
            color: var(--ech-primary-dark);
            font-weight: 600;
            font-size: var(--fs-xs);
            padding: 6px 10px;
            text-align: center;
            border-bottom: 2px solid var(--ech-primary-border);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .mar-table thead th.mar-frozen {
            position: sticky;
            left: 0;
            z-index: 12;
            text-align: left;
            background: var(--ech-primary-light);
            border-right: 2px solid var(--ech-primary-border);
        }

        .mar-table thead th.mar-frozen-med {
            min-width: 320px;
            max-width: 320px;
        }

        .mar-table thead th.mar-frozen-dose {
            min-width: 60px;
            max-width: 60px;
            left: 320px;
            text-align: center;
        }

        .mar-table thead th.mar-frozen-freq {
            min-width: 60px;
            max-width: 60px;
            left: 380px;
            text-align: center;
        }

        .mar-table thead th.mar-frozen-route {
            min-width: 55px;
            max-width: 55px;
            left: 440px;
            text-align: center;
        }

        .mar-table thead th.mar-frozen-actions {
            min-width: 44px;
            max-width: 44px;
            left: 495px;
            text-align: center;
            border-right: 2px solid var(--ech-primary-border);
        }

        .mar-table tbody td {
            padding: 4px 6px;
            border-bottom: 1px solid var(--ech-border-light);
            vertical-align: middle;
            text-align: center;
            font-size: var(--fs-md);
            height: 52px;
        }

        .mar-table tbody td.mar-frozen {
            position: sticky;
            z-index: 5;
            background: var(--ech-surface);
            text-align: left;
        }

        .mar-table tbody td.mar-frozen-med {
            left: 0;
            min-width: 320px;
            max-width: 320px;
        }

        .mar-table tbody td.mar-frozen-dose {
            left: 320px;
            min-width: 60px;
            max-width: 60px;
            text-align: center;
        }

        .mar-table tbody td.mar-frozen-freq {
            left: 380px;
            min-width: 60px;
            max-width: 60px;
            text-align: center;
        }

        .mar-table tbody td.mar-frozen-route {
            left: 440px;
            min-width: 55px;
            max-width: 55px;
            text-align: center;
        }

        .mar-table tbody td.mar-frozen-actions {
            left: 495px;
            min-width: 44px;
            max-width: 44px;
            text-align: center;
            border-right: 2px solid var(--ech-border);
        }

        .mar-table tbody tr:hover td {
            background: var(--ech-hover);
        }

        .mar-table tbody tr:hover td.mar-frozen {
            background: var(--ech-hover);
        }

        .mar-med-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .mar-med-name {
            font-weight: 700;
            color: var(--ech-text);
            font-size: var(--fs-md);
            line-height: 1.3;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .mar-med-detail {
            font-size: var(--fs-xs);
            color: var(--ech-text-secondary);
            line-height: 1.3;
        }

        .mar-high-alert {
            color: var(--ech-warning);
            font-size: var(--fs-xs);
        }

        .mar-time-col {
            min-width: 80px;
            width: 80px;
        }

        .mar-cell {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 58px;
            min-height: 32px;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: var(--fs-xs);
            font-weight: 600;
            cursor: default;
            line-height: 1.3;
        }

        .mar-cell-given {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            color: #2e7d32;
        }

        .mar-cell-due {
            background: #ffffff;
            border: 1px dashed var(--ech-border);
            color: var(--ech-text-muted);
        }

        .mar-cell-hold {
            background: #ffebee;
            border: 1px solid #ef9a9a;
            color: #c62828;
        }

        .mar-cell-not-given {
            background: #ffebee;
            border: 1px solid #e57373;
            color: #b71c1c;
        }

        .mar-cell-cancelled {
            background: #f5f5f5;
            border: 1px solid #bdbdbd;
            color: var(--ech-text-muted);
            text-decoration: line-through;
        }

        .mar-cell-empty {
            color: var(--ech-text-muted);
        }

        .mar-cell .mar-cell-sub {
            font-size: 0.77rem;
            font-weight: 400;
        }

        .mar-row-actions-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: var(--ech-text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            margin: 0 auto;
        }

        .mar-row-actions-btn:hover {
            background: var(--ech-primary-light);
            color: var(--ech-primary);
        }

            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .mar-search-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .mar-search-icon {
            position: absolute;
            left: 8px;
            font-size: 0.923rem;
            color: var(--ech-text-muted);
            pointer-events: none;
        }

        .mar-search-input {

            border: 1px solid var(--ech-border);
            border-radius: 4px;
            font-size: var(--fs-md);
            outline: none;
            min-width: 160px;
            max-width: 220px;
            font-family: var(--ech-font-family);
        }

            border-color: var(--ech-primary);
            box-shadow: 0 0 0 2px rgba(30,136,229,0.15);

            width: 1px;
            height: 20px;
            background: var(--ech-border);
            flex-shrink: 0;
        }

</head>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar collapsed" id="sidebar-component"></aside>

    <main class="main-content">
        <header class="top-bar" id="header-component"></header>
        <section class="clinical-banner" id="banner-component"></section>

        <section class="action-bar" id="action-bar-component">
            <div class="mar-action-bar">

                    <i class="pi pi-plus"></i>

                </button>
                <button class="action-btn" data-i18n="MAR.VALIDATE_ALL" onclick="void(0)">
                    <i class="pi pi-check-circle"></i>
                    <span>Validate All Pending</span>
                </button>
                <div class="action-bar-separator"></div>
                <button class="action-btn" data-i18n="MAR.PRINT_MAR" onclick="void(0)">
                    <i class="pi pi-print"></i>
                    <span>Print MAR</span>
                </button>
                <button class="action-btn" data-i18n="MAR.AUDIT_TRAIL" onclick="void(0)">
                    <i class="pi pi-history"></i>
                    <span>View Audit Trail</span>
                </button>
            </div>
        </section>

        <section class="filter-bar flex align-items-center gap-2 flex-wrap" id="filter-bar">
            <div class="mar-filter-bar">
                <div class="mar-filter-left">
                    <div class="mar-date-nav">
                        <button class="date-nav-btn" onclick="marNavDate(-1)">
                            <i class="pi pi-chevron-left"></i> <span id="marPrevLabel">22 Feb</span>
                        </button>
                        <span class="date-label" data-field="marDate" id="marDateLabel">Today: Monday, 23 Feb 2026</span>
                        <button class="date-nav-btn" onclick="marNavDate(1)">
                            <span id="marNextLabel">24 Feb</span> <i class="pi pi-chevron-right"></i>
                        </button>
                    </div>

                    <div class="mar-filter-separator"></div>

                    <div class="filter-group">
                        <label data-i18n="MAR.TIME_WINDOW">Window:</label>
                        <div class="select-button-group" id="marTimeWindow">
                            <button class="sb-option" data-value="2" onclick="setMarTimeWindow(this)">2h</button>
                            <button class="sb-option active" data-value="4" onclick="setMarTimeWindow(this)">4h</button>
                            <button class="sb-option" data-value="12" onclick="setMarTimeWindow(this)">12h</button>
                        </div>
                    </div>

                    <div class="mar-filter-separator"></div>

                    <div class="filter-group">
                        <label data-i18n="MAR.CARE_TYPE">Type:</label>
                        <div class="select-button-group" id="marCareType">
                            <button class="sb-option active" data-value="all" onclick="setMarCareType(this)">All</button>
                            <button class="sb-option" data-value="current" onclick="setMarCareType(this)">Current</button>
                            <button class="sb-option" data-value="scheduled" onclick="setMarCareType(this)">Scheduled</button>
                            <button class="sb-option" data-value="prn" onclick="setMarCareType(this)">PRN</button>
                        </div>
                    </div>

                    <div class="mar-filter-separator"></div>

                    <div class="mar-search-wrapper">
                        <i class="pi pi-search mar-search-icon"></i>
                        <input type="text" class="mar-search-input" id="marSearchInput" placeholder="Search medication..." data-i18n-placeholder="MAR.SEARCH_PLACEHOLDER" oninput="filterMarTable()">
                    </div>
                </div>

                <div class="mar-legend">
                    <span class="mar-legend-item"><span class="mar-legend-swatch given"></span> <span data-i18n="MAR.LEGEND_GIVEN">Given</span></span>
                    <span class="mar-legend-item"><span class="mar-legend-swatch due"></span> <span data-i18n="MAR.LEGEND_DUE">Due</span></span>
                    <span class="mar-legend-item"><span class="mar-legend-swatch hold"></span> <span data-i18n="MAR.LEGEND_HOLD">Hold/Omit</span></span>
                </div>
            </div>
        </section>

        <section class="module-content-area mar-mode" id="module-content">
            <div class="mar-grid-wrapper">
                <div class="mar-table-container">
                    <table class="mar-table" data-i18n-title="MAR.TABLE_TITLE">
                        <thead id="mar-table-head">
                        </thead>
                        <tbody id="mar-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>

    function renderCell(slot) {
        if (!slot || slot.status === 'empty') {
            return '<span class="mar-cell mar-cell-empty">-</span>';
        }
        if (slot.status === 'given') {
            return '<span class="mar-cell mar-cell-given">' + slot.value + '<span class="mar-cell-sub">' + slot.time + '</span></span>';
        }
        if (slot.status === 'due') {
            return '<span class="mar-cell mar-cell-due">-</span>';
        }
        if (slot.status === 'hold') {
            return '<span class="mar-cell mar-cell-hold">' + slot.value + '<span class="mar-cell-sub">' + (slot.reason || '') + '</span></span>';
        }
        if (slot.status === 'not-given') {
            return '<span class="mar-cell mar-cell-not-given">' + (slot.value || 'NOT GIVEN') + '</span>';
        }
        if (slot.status === 'cancelled') {
            return '<span class="mar-cell mar-cell-cancelled">' + (slot.value || 'CANCELLED') + '</span>';
        }
        return '';
    }

    function getFilteredData() {
        var searchVal = (document.getElementById('marSearchInput') || {}).value || '';
        searchVal = searchVal.toLowerCase();

        return MAR_DATA.filter(function(med) {
            if (marCareType !== 'all' && med.category !== marCareType) return false;
            if (searchVal && med.drug.toLowerCase().indexOf(searchVal) === -1 &&
                med.route.toLowerCase().indexOf(searchVal) === -1 &&
                med.freq.toLowerCase().indexOf(searchVal) === -1) return false;
            return true;
        });
    }

    function renderTable() {
        var thead = document.getElementById('mar-table-head');
        var tbody = document.getElementById('mar-table-body');
        if (!thead || !tbody) return;

        var slots = TIME_SLOTS[marTimeWindow] || TIME_SLOTS[4];

        var headHtml = '<tr>';
        headHtml += '<th class="mar-frozen mar-frozen-med" data-i18n="MAR.COL_MEDICATION">Medication (Dose/Route/Freq)</th>';
        headHtml += '<th class="mar-frozen mar-frozen-dose" data-i18n="MAR.COL_DOSE">Dose</th>';
        headHtml += '<th class="mar-frozen mar-frozen-freq" data-i18n="MAR.COL_FREQ">Freq</th>';
        headHtml += '<th class="mar-frozen mar-frozen-route" data-i18n="MAR.COL_ROUTE">Route</th>';
        headHtml += '<th class="mar-frozen mar-frozen-actions" data-i18n="MAR.COL_ACTIONS">Actions</th>';
        for (var i = 0; i < slots.length; i++) {
            headHtml += '<th class="mar-time-col">' + slots[i] + '</th>';
        }
        headHtml += '</tr>';
        thead.innerHTML = headHtml;

        var data = getFilteredData();
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="' + (5 + slots.length) + '" style="text-align:center;padding:20px;color:var(--ech-text-secondary)"><i class="pi pi-info-circle"></i> No medications match the current filters.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(function(med) {
            var alertIcon = med.highAlert ? '<i class="pi pi-exclamation-triangle mar-high-alert" title="High Alert Medication"></i> ' : '';
            var condLine = '';
            var parts = [];
            if (med.condition) parts.push(med.condition);
            parts.push(med.startDate + ' / ' + med.endDate + ' / ' + med.days);
            condLine = parts.join(' | ');
            var prnLine = med.prnReason ? '<span class="mar-med-detail" style="color:var(--ech-warning);font-weight:600">PRN: ' + med.prnReason + '</span>' : '';

            var slotCells = slots.map(function(t) {
                var s = med.slots[t] || { status: 'empty' };
                return '<td class="mar-time-col">' + renderCell(s) + '</td>';
            }).join('');

            return '<tr data-category="' + med.category + '">' +
                '<td class="mar-frozen mar-frozen-med">' +
                    '<div class="mar-med-info">' +
                        '<span class="mar-med-name">' + alertIcon + med.drug + '</span>' +
                        '<span class="mar-med-detail">' + med.route + ' | ' + med.freq + ' | ' + condLine + '</span>' +
                        prnLine +
                    '</div>' +
                '</td>' +
                '<td class="mar-frozen mar-frozen-dose"><strong>' + med.dose + '</strong></td>' +
                '<td class="mar-frozen mar-frozen-freq">' + med.freq + '</td>' +
                '<td class="mar-frozen mar-frozen-route">' + med.route + '</td>' +
                '<td class="mar-frozen mar-frozen-actions"><button class="mar-row-actions-btn" onclick="void(0)" title="Actions"><i class="pi pi-ellipsis-v"></i></button></td>' +
                slotCells +
            '</tr>';
        }).join('');
    }

    window.setMarTimeWindow = function(btn) {
        document.querySelectorAll('#marTimeWindow .sb-option').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        marTimeWindow = parseInt(btn.dataset.value, 10);
        renderTable();
    };

    window.setMarCareType = function(btn) {
        document.querySelectorAll('#marCareType .sb-option').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        marCareType = btn.dataset.value;
        renderTable();
    };

    window.filterMarTable = function() {
        renderTable();
    };

    window.marNavDate = function(dir) {
        console.log('Navigate MAR date:', dir > 0 ? 'next' : 'previous');
    };

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderTable);
    } else {
        renderTable();
    }
})();
</script>

</body>
</html>
