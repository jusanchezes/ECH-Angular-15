<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE_CARE_PLANS">ECH Care Plans</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="theme-overrides.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar collapsed" id="sidebar-component"></aside>

    <main class="main-content">
        <header class="top-bar" id="header-component"></header>
        <section class="clinical-banner" id="banner-component"></section>

        <section class="action-bar" id="action-bar-component">
            <div class="car-action-bar">
                <button class="action-btn action-btn-primary" data-i18n="CAR.NEW_CARE_TASK" onclick="void(0)">
                    <i class="pi pi-plus-circle"></i>
                    <span>New Care Task</span>
                </button>
                <button class="action-btn action-btn-primary" data-i18n="CAR.VALIDATE_ALL" onclick="void(0)">
                    <i class="pi pi-check-circle"></i>
                    <span>New PRN/Continuous</span>
                </button>
                <div class="action-bar-separator"></div>
                <button class="action-btn" data-i18n="CAR.PRINT_CAR" onclick="void(0)">
                    <i class="pi pi-print"></i>
                    <span>Print CAR</span>
                </button>
                <button class="action-btn" data-i18n="CAR.AUDIT_TRAIL" onclick="void(0)">
                    <i class="pi pi-history"></i>
                    <span>View Audit Trail</span>
                </button>
            </div>
        </section>

        <section class="filter-bar flex align-items-center gap-2 flex-wrap" id="filter-bar">
            <div class="car-filter-bar">
                <div class="car-date-nav">
                    <button class="date-nav-btn" data-i18n="CAR.ROUND" onclick="void(0)">
                        Round Patients <i class="pi pi-chevron-right"></i>
                    </button>
                    <button class="date-nav-btn" data-i18n="CAR.YESTERDAY" onclick="void(0)">
                        <i class="pi pi-chevron-left"></i> Yesterday
                    </button>
                    <span class="date-label" data-field="carDate" data-i18n="CAR.TODAY_DATE">Today</span>
                    <button class="date-nav-btn" data-i18n="CAR.TOMORROW" onclick="void(0)">
                        Tomorrow <i class="pi pi-chevron-right"></i>
                    </button>
                    <button class="date-nav-btn" data-i18n="CAR.PLA" onclick="void(0)">
                        Plan of Care <i class="pi pi-chevron-right"></i>
                    </button>
                    <button class="date-nav-btn" data-i18n="CAR.PRN" onclick="void(0)">
                        PRN/Continuous <i class="pi pi-chevron-right"></i>
                    </button>
                </div>
                <div class="car-legend">
                    <span class="car-legend-item">
                        <span class="car-legend-dot completed"></span>
                        <span data-i18n="CAR.LEGEND_COMPLETED">Completed</span>
                    </span>
                    <span class="car-legend-item">
                        <span class="car-legend-dot pending"></span>
                        <span data-i18n="CAR.LEGEND_PENDING">Pending</span>
                    </span>
                    <span class="car-legend-item">
                        <span class="car-legend-dot overdue"></span>
                        <span data-i18n="CAR.LEGEND_OVERDUE">Overdue</span>
                    </span>
                </div>
            </div>
        </section>

        <section class="module-content-area car-mode" id="module-content">
            <div class="car-grid-wrapper">
                <div class="car-table-container">
                    <table class="car-table" data-i18n-title="CAR.TABLE_TITLE">
                        <thead>
                            <tr>
                                <th class="car-frozen" data-i18n="CAR.COL_TASK">Care Task (Frequency)</th>
                                <th class="car-time-col">08:00</th>
                                <th class="car-time-col">10:00</th>
                                <th class="car-time-col">12:00</th>
                                <th class="car-time-col">14:00</th>
                                <th class="car-time-col">16:00</th>
                                <th class="car-time-col">18:00</th>
                                <th class="car-time-col">20:00</th>
                                <th class="car-time-col">22:00</th>
                            </tr>
                        </thead>
                        <tbody id="car-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="layout.js"></script>
<script>
(function() {
    const CAR_DATA = [
        {
            task: 'Respiratory Monitoring',

                { time: '--', status: 'pending' },

            ]

        },
        {

            detail: 'Full bed bath + skin check | Q24H',
            icon: 'pi-filter',

            slots: [

                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },

        {

            slots: [

                { time: null, status: 'empty' },
                { time: '12:30', status: 'completed' },
                { time: null, status: 'empty' },
                { time: '--', status: 'pending' },
                { time: null, status: 'empty' },

                { time: null, status: 'empty' }
            ]
        },
        {
            task: 'Fall Risk Assessment',

            slots: [

            slots: [
                { time: '09:00', status: 'completed' },

            ]

        {
            task: 'Urine Output',
            detail: 'Catheter care + output Q4H',
            icon: 'pi-trash',
            category: 'Eliminación',
            discipline: 'Enfermería',
            slots: [
                { time: '08:00', status: 'completed' },
                { time: null, status: 'empty' },
                { time: '12:05', status: 'completed' },
                { time: null, status: 'empty' },

                { time: '--', status: 'pending' },
                { time: null, status: 'empty' }
            ]
        },
        {
            task: 'Wound Dressing Change',
            detail: 'Abdominal wound, Betadine | Q12H',
            icon: 'pi-heart',
            category: 'Heridas',
            discipline: 'Enfermería',
            slots: [
                { time: '08:40', status: 'completed' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: '--', status: 'pending' },
                { time: null, status: 'empty' }
            ]
        }
    ];

    function renderCell(slot) {
        if (!slot || slot.status === 'empty') {
            return slot && slot.time ? `<span class="car-cell car-cell-empty">${slot.time}</span>` : '';
        }
        if (slot.status === 'completed') {
            return `<span class="car-cell car-cell-completed"><span class="car-dot dot-completed"></span>${slot.time}</span>`;
        }
        if (slot.status === 'overdue') {
            return `<span class="car-cell car-cell-overdue"><span class="car-dot dot-overdue"></span>${slot.time}</span>`;
        }
        if (slot.status === 'pending') {
            return `<span class="car-cell car-cell-pending"><span class="car-dot dot-pending"></span>${slot.time}</span>`;
        }
        return '';
    }

    function renderTable() {
        const tbody = document.getElementById('car-table-body');
        if (!tbody) return;

        tbody.innerHTML = CAR_DATA.map(row => {
            const slotCells = row.slots.map(s => `<td class="car-time-col">${renderCell(s)}</td>`).join('');
            return `<tr>
                <td class="car-frozen">
                    <div class="car-task-info">
                        <span class="car-task-name">
                            <i class="pi ${row.icon}" style="margin-right:4px;font-size:var(--fs-xs)"></i>${row.task}
                        </span>
                        <span class="car-task-detail">${row.detail}</span>
                    </div>
                </td>
                ${slotCells}
            </tr>`;
        }).join('');
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderTable);
    } else {
        renderTable();
    }
})();
</script>

</body>
</html>
