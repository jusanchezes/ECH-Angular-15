<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE_CARE_PLANS">ECH Care Plans</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="theme-overrides.css">
    <style>
        .car-action-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .car-filter-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .car-date-nav {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .car-date-nav .date-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border: 1px solid var(--ech-border);
            border-radius: 4px;
            background: var(--ech-surface);
            color: var(--ech-text);
            font-size: var(--fs-xs);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: var(--ech-font-family);
        }

        .car-date-nav .date-nav-btn:hover {
            background: var(--ech-primary-light);
            border-color: var(--ech-primary);
            color: var(--ech-primary-dark);
        }

        .car-date-nav .date-label {
            font-weight: 700;
            font-size: var(--fs-md);
            color: var(--ech-text);
            white-space: nowrap;
        }

        .car-legend {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: var(--fs-xs);
            color: var(--ech-text-secondary);
        }

        .car-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .car-legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .car-legend-dot.completed { background: var(--ech-success); }
        .car-legend-dot.pending { background: var(--ech-text-muted); }
        .car-legend-dot.overdue { background: var(--ech-danger); }

        .car-grid-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 0 10px 10px;
        }

        .car-table-container {
            flex: 1;
            overflow: auto;
            border: 1px solid var(--ech-border);
            border-radius: 4px;
            background: var(--ech-surface);
            position: relative;
        }

        .car-table {
            border-collapse: separate;
            border-spacing: 0;
            width: max-content;
            min-width: 100%;
            font-size: var(--fs-md);
        }

        .car-table thead th {
            background: var(--ech-primary-light);
            color: var(--ech-primary-dark);
            font-weight: 600;
            font-size: var(--fs-xs);
            padding: 6px 10px;
            text-align: center;
            border-bottom: 2px solid var(--ech-primary-border);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .car-table thead th.car-frozen {
            position: sticky;
            left: 0;
            z-index: 12;
            text-align: left;
            background: var(--ech-primary-light);
            min-width: 340px;
            max-width: 340px;
            border-right: 2px solid var(--ech-primary-border);
        }

        .car-table tbody td {
            padding: 4px 8px;
            border-bottom: 1px solid var(--ech-border-light);
            vertical-align: middle;
            text-align: center;
            font-size: var(--fs-md);
            height: 48px;
        }

        .car-table tbody td.car-frozen {
            position: sticky;
            left: 0;
            z-index: 5;
            background: var(--ech-surface);
            text-align: left;
            min-width: 340px;
            max-width: 340px;
            border-right: 2px solid var(--ech-border);
        }

        .car-table tbody tr:hover td {
            background: var(--ech-hover);
        }

        .car-table tbody tr:hover td.car-frozen {
            background: var(--ech-hover);
        }

        .car-task-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .car-task-name {
            font-weight: 700;
            color: var(--ech-text);
            font-size: var(--fs-md);
            line-height: 1.3;
        }

        .car-task-detail {
            font-size: var(--fs-xs);
            color: var(--ech-text-secondary);
            line-height: 1.3;
        }

        .car-time-col {
            min-width: 80px;
            width: 80px;
        }

        .car-cell {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 54px;
            min-height: 30px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: var(--fs-xs);
            font-weight: 600;
            cursor: default;
        }

        .car-cell-completed {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            color: #2e7d32;
        }

        .car-cell-pending {
            background: #f5f5f5;
            border: 1px dashed var(--ech-border);
            color: var(--ech-text-muted);
        }

        .car-cell-overdue {
            background: #ffebee;
            border: 1px solid #ef9a9a;
            color: #c62828;
        }

        .car-cell-empty {
            color: var(--ech-text-muted);
        }

        .car-cell .car-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
            flex-shrink: 0;
        }

        .car-dot.dot-completed { background: var(--ech-success); }
        .car-dot.dot-pending { background: var(--ech-text-muted); }
        .car-dot.dot-overdue { background: var(--ech-danger); }

        .module-content-area.car-mode {
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar collapsed" id="sidebar-component"></aside>

    <main class="main-content">
        <header class="top-bar" id="header-component"></header>
        <section class="clinical-banner" id="banner-component"></section>

        <section class="action-bar" id="action-bar-component">
            <div class="car-action-bar">
                <button class="action-btn" data-i18n="CAR.NEW_CARE_TASK" onclick="void(0)">
                    <i class="pi pi-plus-circle"></i>
                    <span>New Care Task</span>
                </button>
                <button class="action-btn" data-i18n="CAR.VALIDATE_ALL" onclick="void(0)">
                    <i class="pi pi-check-circle"></i>
                    <span>Validate All Pending</span>
                </button>
                <button class="action-btn" data-i18n="CAR.COPY_YESTERDAY" onclick="void(0)">
                    <i class="pi pi-copy"></i>
                    <span>Copy from Yesterday</span>
                </button>
                <div class="action-bar-separator"></div>
                <button class="action-btn" data-i18n="CAR.PRINT_CAR" onclick="void(0)">
                    <i class="pi pi-print"></i>
                    <span>Print CAR</span>
                </button>
                <button class="action-btn" data-i18n="CAR.AUDIT_TRAIL" onclick="void(0)">
                    <i class="pi pi-history"></i>
                    <span>View Audit Trail</span>
                </button>
            </div>
        </section>

        <section class="filter-bar flex align-items-center gap-2 flex-wrap" id="filter-bar">
            <div class="car-filter-bar">
                <div class="car-date-nav">
                    <button class="date-nav-btn" data-i18n="CAR.YESTERDAY" onclick="void(0)">
                        <i class="pi pi-chevron-left"></i> Yesterday
                    </button>
                    <span class="date-label" data-field="carDate" data-i18n="CAR.TODAY_DATE">Today: 23 Feb 2026</span>
                    <button class="date-nav-btn" data-i18n="CAR.TOMORROW" onclick="void(0)">
                        Tomorrow <i class="pi pi-chevron-right"></i>
                    </button>
                </div>
                <div class="car-legend">
                    <span class="car-legend-item">
                        <span class="car-legend-dot completed"></span>
                        <span data-i18n="CAR.LEGEND_COMPLETED">Completed</span>
                    </span>
                    <span class="car-legend-item">
                        <span class="car-legend-dot pending"></span>
                        <span data-i18n="CAR.LEGEND_PENDING">Pending</span>
                    </span>
                    <span class="car-legend-item">
                        <span class="car-legend-dot overdue"></span>
                        <span data-i18n="CAR.LEGEND_OVERDUE">Overdue</span>
                    </span>
                </div>
            </div>
        </section>

        <section class="module-content-area car-mode" id="module-content">
            <div class="car-grid-wrapper">
                <div class="car-table-container">
                    <table class="car-table" data-i18n-title="CAR.TABLE_TITLE">
                        <thead>
                            <tr>
                                <th class="car-frozen" data-i18n="CAR.COL_TASK">Care Task (Frequency)</th>
                                <th class="car-time-col">08:00</th>
                                <th class="car-time-col">10:00</th>
                                <th class="car-time-col">12:00</th>
                                <th class="car-time-col">14:00</th>
                                <th class="car-time-col">16:00</th>
                                <th class="car-time-col">18:00</th>
                                <th class="car-time-col">20:00</th>
                                <th class="car-time-col">22:00</th>
                            </tr>
                        </thead>
                        <tbody id="car-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="layout.js"></script>
<script>
(function() {
    const CAR_DATA = [
        {
            task: 'Respiratory Monitoring',
            detail: 'Goal: Breathing adequate | Q2H',
            icon: 'pi-cloud',
            category: 'Respiratorio',

                { time: 'MISSING', status: 'overdue' },
                { time: '--', status: 'pending' },

            ]
        },
        {
            task: 'Subclavian Care',

            ]
        },
        {
            task: 'Bed Bath',
            detail: 'Full bed bath + skin check | Q24H',
            icon: 'pi-filter',
            category: 'Higiene',
            discipline: 'TCAE',
            slots: [
                { time: '09:15', status: 'completed' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' }
            ]
        },
        {
            task: 'Mobilisation',
            detail: 'Chair transfer + walking 10m | Q4H',
            icon: 'pi-directions',

            discipline: 'Fisio',
            slots: [
                { time: '08:45', status: 'completed' },
                { time: null, status: 'empty' },
                { time: '12:30', status: 'completed' },
                { time: null, status: 'empty' },
                { time: '--', status: 'pending' },
                { time: null, status: 'empty' },
                { time: '--', status: 'pending' },
                { time: null, status: 'empty' }
            ]
        },
        {
            task: 'Fall Risk Assessment',
            detail: 'Morse scale reassessment | Q12H',
            icon: 'pi-shield',
            category: 'Seguridad',
            discipline: 'Enfermería',
            slots: [
                { time: '08:00', status: 'completed' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },

            slots: [
                { time: '08:20', status: 'completed' },
                { time: null, status: 'empty' },
                { time: '12:15', status: 'completed' },
                { time: null, status: 'empty' },

                { time: null, status: 'empty' },
                { time: '--', status: 'pending' },

        {

            detail: 'Meal intake % + fluid balance | Q8H',

            discipline: 'TCAE',
            slots: [
                { time: '09:00', status: 'completed' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: 'MISSING', status: 'overdue' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: '--', status: 'pending' }
            ]
        },
        {
            task: 'Urine Output',
            detail: 'Catheter care + output Q4H',
            icon: 'pi-trash',
            category: 'Eliminación',
            discipline: 'Enfermería',
            slots: [
                { time: '08:00', status: 'completed' },
                { time: null, status: 'empty' },
                { time: '12:05', status: 'completed' },
                { time: null, status: 'empty' },
                { time: '--', status: 'pending' },
                { time: null, status: 'empty' },
                { time: '--', status: 'pending' },
                { time: null, status: 'empty' }
            ]
        },
        {
            task: 'Wound Dressing Change',
            detail: 'Abdominal wound, Betadine | Q12H',
            icon: 'pi-heart',
            category: 'Heridas',
            discipline: 'Enfermería',
            slots: [
                { time: '08:40', status: 'completed' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: null, status: 'empty' },
                { time: '--', status: 'pending' },
                { time: null, status: 'empty' }
            ]
        }
    ];

    function renderCell(slot) {
        if (!slot || slot.status === 'empty') {
            return slot && slot.time ? `<span class="car-cell car-cell-empty">${slot.time}</span>` : '';
        }
        if (slot.status === 'completed') {
            return `<span class="car-cell car-cell-completed"><span class="car-dot dot-completed"></span>${slot.time}</span>`;
        }
        if (slot.status === 'overdue') {
            return `<span class="car-cell car-cell-overdue"><span class="car-dot dot-overdue"></span>${slot.time}</span>`;
        }
        if (slot.status === 'pending') {
            return `<span class="car-cell car-cell-pending"><span class="car-dot dot-pending"></span>${slot.time}</span>`;
        }
        return '';
    }

    function renderTable() {
        const tbody = document.getElementById('car-table-body');
        if (!tbody) return;

        tbody.innerHTML = CAR_DATA.map(row => {
            const slotCells = row.slots.map(s => `<td class="car-time-col">${renderCell(s)}</td>`).join('');
            return `<tr>
                <td class="car-frozen">
                    <div class="car-task-info">
                        <span class="car-task-name">
                            <i class="pi ${row.icon}" style="margin-right:4px;font-size:var(--fs-xs)"></i>${row.task}
                        </span>
                        <span class="car-task-detail">${row.detail}</span>
                    </div>
                </td>
                ${slotCells}
            </tr>`;
        }).join('');
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderTable);
    } else {
        renderTable();
    }
})();
</script>

</body>
</html>
