<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE_MEASUREMENTS">ECH Measurements</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="css/clinical-core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/action-bar.css">
    <link rel="stylesheet" href="css/results-table.css">
    <link rel="stylesheet" href="css/modules/measurements.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- BEGIN: Angular Standalone Component — SidebarComponent -->
    <aside class="sidebar collapsed" id="sidebar-component"></aside>
    <!-- END: SidebarComponent -->

    <main class="main-content">
        <!-- BEGIN: Angular Standalone Component — HeaderComponent -->
        <header class="top-bar" id="header-component"></header>
        <!-- END: HeaderComponent -->
        <!-- BEGIN: Angular Standalone Component — ClinicalBannerComponent -->
        <section class="clinical-banner" id="banner-component"></section>
        <!-- END: ClinicalBannerComponent -->

        <!-- BEGIN: Angular Standalone Component — ActionBarComponent -->
        <section class="action-bar" id="action-bar-component">
            <button class="action-btn action-btn-primary" onclick="msOpenRegister()" data-i18n-title="MEASUREMENTS.REGISTER_VITAL_SIGNS" title="Register Vital Signs">
                <i class="pi pi-plus-circle"></i> <span data-i18n="MEASUREMENTS.REGISTER_VITAL_SIGNS">Register Vital Signs</span>
            </button>
        </section>
        <!-- END: ActionBarComponent -->

        <!-- BEGIN: Angular Standalone Component — FilterBarComponent  NO se si quitar -->
        <!-- <section class="filter-bar flex align-items-center gap-2 flex-wrap" id="filter-bar"></section>
        <!-- END: FilterBarComponent -->

        <section class="module-content-area" id="module-content" style="padding:0;">
            <div class="results-layout">
                <div class="results-panel">
                    <div class="results-panel-title" data-i18n="MEASUREMENTS.GROUPS_TITLE">Groups</div>
                    <ul class="results-panel-list" id="msGroupList"></ul>
                </div>

                <div class="results-main-panel">
                    <div class="module-toolbar">
                        <div class="module-toolbar-left">
                            <div class="toolbar-segment-group" id="msScaleGroup">
                                <button class="toolbar-segment-btn" data-scale="15" onclick="msSetScale(this)" data-i18n="MEASUREMENTS.SCALE_15M">15m</button>
                                <button class="toolbar-segment-btn" data-scale="60" onclick="msSetScale(this)" data-i18n="MEASUREMENTS.SCALE_1H">1h</button>
                                <button class="toolbar-segment-btn active" data-scale="240" onclick="msSetScale(this)" data-i18n="MEASUREMENTS.SCALE_4H">4h</button>
                                <button class="toolbar-segment-btn" data-scale="480" onclick="msSetScale(this)" data-i18n="MEASUREMENTS.SCALE_8H">8h</button>
                                <button class="toolbar-segment-btn" data-scale="1440" onclick="msSetScale(this)" data-i18n="MEASUREMENTS.SCALE_24H">24h</button>
                            </div>

                            <div class="toolbar-date-nav">
                                <button class="toolbar-date-btn" onclick="msNavDate(-1)" data-i18n-title="MEASUREMENTS.PREV_DAY"><i class="pi pi-chevron-left"></i></button>
                                <span class="toolbar-date-label" id="msDateLabel" data-field="measurementDate"></span>
                                <button class="toolbar-date-btn" onclick="msNavDate(1)" data-i18n-title="MEASUREMENTS.NEXT_DAY"><i class="pi pi-chevron-right"></i></button>
                            </div>

                            <div class="toolbar-filter-group">
                                <button class="toolbar-filter-btn" id="msBtnAbnormal" onclick="msToggleAbnormal()" data-i18n="MEASUREMENTS.BTN_ABNORMAL">Abnormal Only</button>
                                <button class="toolbar-filter-btn" id="msBtnCritical" onclick="msToggleCritical()" data-i18n="MEASUREMENTS.BTN_CRITICAL">Critical Only</button>
                                <button class="toolbar-filter-btn" id="msBtnTrend" onclick="msToggleTrendView()"><i class="pi pi-chart-line"></i> <span data-i18n="MEASUREMENTS.BTN_TREND">Trend View</span></button>
                            </div>
                        </div>
                    </div>

                    <div class="results-table-wrapper" id="msTableWrapper">
                        <table class="results-table" data-i18n-title="MEASUREMENTS.TABLE_TITLE">
                            <thead id="msTableHead"></thead>
                            <tbody id="msTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<div class="ms-tooltip" id="msTooltip"></div>

<div class="ms-modal-overlay" id="msModal">
    <div class="ms-modal">
        <div class="ms-modal-header">
            <span data-i18n="MEASUREMENTS.REGISTER_TITLE">Register Vital Signs</span>
            <button class="ms-modal-close" onclick="msCloseRegister()"><i class="pi pi-times"></i></button>
        </div>
        <div class="ms-modal-body" id="msModalBody"></div>
        <div class="ms-modal-footer">
            <button class="ms-btn-cancel" onclick="msCloseRegister()" data-i18n="COMMON.CANCEL">Cancel</button>
            <button class="ms-btn-save" onclick="msSaveRegister()" data-i18n="COMMON.SAVE">Save</button>
        </div>
    </div>
</div>

<script src="layout.js"></script>
<script src="measurements.js"></script>

</body>
</html>
