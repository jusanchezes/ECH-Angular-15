<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PATIENT_LIST_TITLE">ECH Patient List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="theme-overrides.css">
</head>
<body>

<div class="layout layout-no-sidebar">

    <main class="main-content main-full-width">

        <header class="top-bar" id="header-component">
            <div class="top-bar-left flex align-items-center gap-2">
                <div class="logo flex align-items-center gap-1">
                    <i class="pi pi-shield"></i>
                    <span data-i18n="APP.TITLE">ECH</span>
                </div>
            </div>

            <div class="top-bar-center flex align-items-center gap-1">
                <i class="pi pi-building"></i>
                <span data-field="wardName" data-i18n="HEADER.WARD">Inpatients</span>
                <span class="text-color-secondary font-normal">| <span data-field="currentDate">20/02/2026</span></span>
            </div>

            <div class="top-bar-right flex align-items-center gap-2">
                <div class="notification-btn" data-i18n-title="HEADER.ALERTS_TITLE" title="Alerts & Messages">
                    <i class="pi pi-bell text-color-secondary icon-md"></i>
                    <span class="badge-count" data-field="alertCount">3</span>
                </div>
                <div class="notification-btn" data-i18n-title="HEADER.MESSAGES_TITLE" title="Messages">
                    <i class="pi pi-envelope text-color-secondary icon-md"></i>
                    <span class="badge-count" data-field="messageCount">1</span>
                </div>
                <div class="notification-btn" data-i18n-title="HEADER.HELP_TITLE" title="Help">
                    <i class="pi pi-question-circle icon-md text-primary-color"></i>
                </div>
                <div class="user-info flex align-items-center gap-1">
                    <i class="pi pi-user text-primary-color"></i>
                    <span><strong data-field="userName">Dr. Rory Rogers</strong></span>
                    <span class="text-color-secondary" data-field="userService">Service of Healthcare Provider A1</span>
                    <span class="text-color-secondary">| <span data-field="userDepartment">Adult Emergency</span></span>
                </div>
            </div>
        </header>

        <section class="patient-list-area" id="patient-list-component">
            <div class="patient-list-container" id="patientListContainer">
            </div>
        </section>

    </main>
</div>

<footer class="bottom-bar" id="footer-component">
    <button class="bottom-item active" data-i18n-title="FOOTER.HOME" title="Home">
        <i class="pi pi-home"></i>
        <span data-i18n="FOOTER.HOME">Home</span>
    </button>
    <button class="bottom-item" data-i18n-title="FOOTER.SEARCH" title="Search">
        <i class="pi pi-search"></i>
        <span data-i18n="FOOTER.SEARCH">Search</span>
    </button>
    <button class="bottom-item" data-i18n-title="FOOTER.FAVORITES" title="Favorites">
        <i class="pi pi-star"></i>
        <span data-i18n="FOOTER.FAVORITES">Favorites</span>
    </button>
    <button class="bottom-item" data-i18n-title="FOOTER.CONFIG" title="Configuration">
        <i class="pi pi-cog"></i>
        <span data-i18n="FOOTER.CONFIG">Config</span>
    </button>
    <button class="bottom-item" data-i18n-title="FOOTER.INFO" title="Info">
        <i class="pi pi-info-circle"></i>
        <span data-i18n="FOOTER.INFO">Info</span>
    </button>
</footer>

<script src="patients.js"></script>

</body>
</html>
