<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PATIENT_LIST_TITLE">ECH Patient List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="theme-overrides.css">
</head>
<body data-page-type="patient-list">

<!-- LAYOUT: Patient list view without sidebar. Angular: PatientListComponent rendered at root route -->
<div class="layout layout-no-sidebar">

    <main class="main-content main-full-width">

        <!-- COMPONENT BOUNDARY: <ech-header> — Injected by layout.js -->
        <header class="top-bar" id="header-component"></header>

        <!-- COMPONENT BOUNDARY: <ech-patient-list> — Angular Standalone Component -->
        <section class="patient-list-area" id="patient-list-component">
            <div class="patient-list-container" id="patientListContainer">
            </div>
        </section>

    </main>
</div>

<script src="layout.js"></script>
<script src="patients.js"></script>

</body>
</html>
