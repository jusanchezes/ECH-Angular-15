<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="APP.PAGE_TITLE_LABORATORY">ECH Laboratory Results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css">
    <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.1/primeicons.css">
    <link rel="stylesheet" href="css/clinical-core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/banner.css">
    <link rel="stylesheet" href="css/action-bar.css">
    <link rel="stylesheet" href="css/results-table.css">
    <link rel="stylesheet" href="css/modules/laboratory.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- BEGIN: Angular Standalone Component — SidebarComponent -->
    <aside class="sidebar collapsed" id="sidebar-component"></aside>
    <!-- END: SidebarComponent -->

    <main class="main-content">
        <!-- BEGIN: Angular Standalone Component — HeaderComponent -->
        <header class="top-bar" id="header-component"></header>
        <!-- END: HeaderComponent -->
        <!-- BEGIN: Angular Standalone Component — ClinicalBannerComponent -->
        <section class="clinical-banner" id="banner-component"></section>
        <!-- END: ClinicalBannerComponent -->

        <!-- BEGIN: Angular Standalone Component — ActionBarComponent -->
        <section class="action-bar" id="action-bar-component"></section>
        <!-- END: ActionBarComponent -->
        <!-- BEGIN: Angular Standalone Component — FilterBarComponent -->
        <section class="filter-bar flex align-items-center gap-2 flex-wrap" id="filter-bar"></section>
        <!-- END: FilterBarComponent -->

        <section class="module-content-area" id="module-content" style="padding:0;">

            <div class="results-layout">
                <div class="results-panel">
                    <div class="results-panel-title" data-i18n="LAB.DISCIPLINES_TITLE">Disciplines</div>
                    <ul class="results-panel-list" id="labDisciplineList"></ul>
                </div>

                <div class="results-main-panel">
                    <div class="module-toolbar">
                        <div class="module-toolbar-left">
                            <div class="toolbar-segment-group" id="labTimeGroup">
                                <button class="toolbar-segment-btn active" data-range="24" onclick="labSetTimeRange(this)" data-i18n="LAB.RANGE_24H">24h</button>
                                <button class="toolbar-segment-btn" data-range="48" onclick="labSetTimeRange(this)" data-i18n="LAB.RANGE_48H">48h</button>
                                <button class="toolbar-segment-btn" data-range="72" onclick="labSetTimeRange(this)" data-i18n="LAB.RANGE_72H">72h</button>
                            </div>
                            <div class="toolbar-filter-group">
                                <button class="toolbar-filter-btn" id="labBtnAbnormal" onclick="labToggleAbnormal()" data-i18n="LAB.BTN_ABNORMAL">Abnormal Only</button>
                                <button class="toolbar-filter-btn" id="labBtnCritical" onclick="labToggleCritical()" data-i18n="LAB.BTN_CRITICAL">Critical Only</button>
                                <button class="toolbar-filter-btn" id="labBtnTrend" onclick="labToggleTrendView()"><i class="pi pi-chart-line"></i> <span data-i18n="LAB.BTN_TREND">Trend View</span></button>
                            </div>
                        </div>
                        <div class="module-toolbar-right">
                            <span class="toolbar-search-wrapper">
                                <i class="pi pi-search"></i>
                                <input type="text" class="toolbar-search-input" id="labSearchInput" placeholder="Search analyte..." data-i18n-placeholder="LAB.SEARCH_PLACEHOLDER" oninput="labFilterBySearch(this.value)">
                            </span>
                        </div>
                    </div>

                    <div class="results-table-wrapper" id="labTableWrapper">
                        <table class="results-table p-datatable-sm" id="labResultsTable">
                            <thead id="labTableHead"></thead>
                            <tbody id="labTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="lab-detail-backdrop" id="labDetailBackdrop" onclick="labCloseDetail()"></div>
            <div class="lab-detail-sidebar" id="labDetailSidebar">
                <div class="lab-detail-header">
                    <span class="lab-detail-title" id="labDetailTitle" data-i18n="LAB.DETAIL_TITLE">Result Detail</span>
                    <button class="lab-detail-close" onclick="labCloseDetail()"><i class="pi pi-times"></i></button>
                </div>
                <div class="lab-detail-body" id="labDetailBody"></div>
            </div>

        </section>
    </main>
</div>

<script src="layout.js"></script>
<script src="laboratory.js"></script>
</body>
</html>
